<!DOCTYPE html>
<html>
<head>
  <title>FARK 618</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to bottom, #e3f2fd, #ffffff);
      padding: 15px;
      padding-bottom: 120px;
    }

    h1 {
      text-align: center;
      color: #333;
    }

    #cart {
      position: fixed;
      top: 20px;
      right: 20px;
      background: black;
      color: white;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
    }

    #authBtn {
      position: fixed;
      top: 20px;
      left: 20px;
      background: #ff3d00;
      color: white;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
    }

    #account {
      position: fixed;
      top: 70px;
      right: 20px;
      background: #00c853;
      color: white;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
    }

    #welcome {
      text-align: center;
      margin-bottom: 10px;
      font-weight: bold;
      color: #444;
    }

    /* 🎥 VIDEO FIX */
    .video-box {
      width: 100%;
      max-width: 400px;
      margin: 15px auto;
      border-radius: 15px;
      overflow: hidden;
      background: black;
    }

    .video-box iframe {
      width: 100%;
      height: 500px; /* 🔥 vertical video correct */
      object-fit: cover;
      border: none;
    }

    /* 🛍 PRODUCTS */
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
    }

    select {
      padding: 8px;
      margin-top: 10px;
      border-radius: 5px;
    }

    button {
      background: black;
      color: white;
      padding: 10px;
      border: none;
      margin-top: 10px;
      cursor: pointer;
      border-radius: 5px;
    }

    .fav-btn {
      background: linear-gradient(to right, orange, gold);
      color: black;
      font-weight: bold;
    }

    /* 🔻 Bottom Nav */
    #bottomNav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      border-top: 2px solid #ddd;
    }

    #bottomNav div {
      text-align: center;
      font-size: 14px;
      color: #333;
      cursor: pointer;
    }

  </style>
</head>

<body>

<div id="authBtn" onclick="handleAuth()">...</div>
<div id="account" onclick="goToAccount()">My Account 👤</div>
<h3 id="welcome"></h3>
<div id="cart" onclick="goToCart()">Cart: 0</div>

<h1>FARK 618 🛍️</h1>

<!-- 🎥 VIDEO -->
<div class="video-box">
  <iframe 
    src="https://www.youtube.com/embed/y1zCKcv2AiY?autoplay=1&mute=1&playsinline=1"
    allow="autoplay"
    allowfullscreen>
  </iframe>
</div>

<div id="products" class="products"></div>

<div id="bottomNav">
  <div onclick="goHome()">🏠<br>Home</div>
  <div onclick="goToAccount()">👤<br>Account</div>
  <div onclick="goToCart()">🛒<br>Cart</div>
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let productsData = [];
const user = localStorage.getItem("user");

document.getElementById("welcome").innerText =
  user ? "Welcome, " + user : "Welcome, Guest";

document.getElementById("authBtn").innerText =
  user ? "Logout" : "Login";

function handleAuth() {
  if (user) {
    localStorage.removeItem("user");
    location.reload();
  } else {
    window.location.href = "login.html";
  }
}

function updateCartUI() {
  document.getElementById("cart").innerText = "Cart: " + cart.length;
}
updateCartUI();

function loadProducts() {

  fetch("https://fark618-1.onrender.com/products")
  .then(res => res.json())
  .then(data => {

    productsData = data;
    let html = "";

    data.forEach(p => {

      let sizeOptions = "";

      if (p.name.toLowerCase().includes("shirt")) {
        sizeOptions = `
          <option value="">Select Size</option>
          <option>S</option>
          <option>M</option>
          <option>L</option>
          <option>XL</option>
          <option>XXL</option>
        `;
      } else {
        sizeOptions = `
          <option value="">Select Size</option>
          <option>30</option>
          <option>32</option>
          <option>34</option>
          <option>36</option>
          <option>38</option>
          <option>40</option>
        `;
      }

      html += `
        <div class="card">
          <img src="${p.image || 'https://via.placeholder.com/200'}">
          <h3>${p.name}</h3>
          <p>₹${p.price}</p>
          <p>Stock: ${p.stock}</p>

          <select id="size-${p._id}">
            ${sizeOptions}
          </select>

          <button onclick="addToCart('${p._id}')">Add to Cart</button>

          <button class="fav-btn" onclick="addToFav('${p._id}')">
            ❤️ Favorite
          </button>
        </div>
      `;
    });

    document.getElementById("products").innerHTML = html;
  });
}

function addToCart(id) {

  if (!user) {
    alert("Login first ❌");
    return;
  }

  const product = productsData.find(p => p._id == id);
  const size = document.getElementById("size-" + id).value;

  if (!size) {
    alert("Select size ❗");
    return;
  }

  cart.push({
    id: product._id,
    name: product.name,
    price: product.price,
    size: size
  });

  localStorage.setItem("cart", JSON.stringify(cart));
  updateCartUI();

  alert("Added to cart ✅");
}

function addToFav(id) {

  if (!user) {
    alert("Login first ❌");
    return;
  }

  const product = productsData.find(p => p._id == id);

  let fav = JSON.parse(localStorage.getItem("fav")) || [];

  fav.push(product);

  localStorage.setItem("fav", JSON.stringify(fav));

  alert("Added ❤️");
}

function goToCart() {
  if (!user) return alert("Login first ❌");
  window.location.href = "cart.html";
}

function goToAccount() {
  if (!user) return alert("Login first ❌");
  window.location.href = "account.html";
}

function goHome() {
  window.location.href = "index.html";
}

loadProducts();

</script>

</body>
</html>
