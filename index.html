<!DOCTYPE html>
<html>
<head>
  <title>FARK 618</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    #cart {
      position: fixed;
      top: 20px;
      right: 20px;
      background: black;
      color: white;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
    }

    #authBtn {
      position: fixed;
      top: 20px;
      left: 20px;
      background: red;
      color: white;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
    }

    #account {
      position: fixed;
      top: 70px;
      right: 20px;
      background: green;
      color: white;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
    }

    #welcome {
      text-align: center;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    button {
      background: black;
      color: white;
      padding: 10px;
      border: none;
      margin-top: 10px;
      cursor: pointer;
    }

    button:disabled {
      background: grey;
    }

    .fav-btn {
      background: orange;
    }
  </style>
</head>

<body>

<!-- 🔁 LOGIN / LOGOUT BUTTON -->
<div id="authBtn" onclick="handleAuth()">Loading...</div>

<!-- 🟢 My Account -->
<div id="account" onclick="goToAccount()">My Account 👤</div>

<!-- 👤 Welcome -->
<h3 id="welcome"></h3>

<!-- 🛒 Cart -->
<div id="cart" onclick="goToCart()">Cart: 0</div>

<h1>FARK 618 🛍️</h1>

<div id="products" class="products"></div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let productsData = [];
const user = localStorage.getItem("user");

// 👋 welcome
document.getElementById("welcome").innerText =
  user ? "Welcome, " + user : "Welcome, Guest";

// 🔁 auth button
const authBtn = document.getElementById("authBtn");
authBtn.innerText = user ? "Logout" : "Login";

// 🔐 login / logout
function handleAuth() {
  if (user) {
    localStorage.removeItem("user");
    alert("Logged out 👋");
    location.reload();
  } else {
    window.location.href = "login.html";
  }
}

// 🛒 cart UI
function updateCartUI() {
  document.getElementById("cart").innerText = "Cart: " + cart.length;
}
updateCartUI();

// 📦 load products
function loadProducts() {
  fetch("https://fark618-1.onrender.com/products")
  .then(res => res.json())
  .then(data => {

    productsData = data;

    let html = "";

    data.forEach(p => {
      html += `
        <div class="card">
          <img src="${p.image || 'https://via.placeholder.com/200'}">
          <h3>${p.name}</h3>
          <p>₹${p.price}</p>
          <p>Stock: ${p.stock}</p>

          <button onclick="addToCart('${p._id}')"
            ${p.stock == 0 ? "disabled" : ""}>
            ${p.stock == 0 ? "Out of Stock" : "Add to Cart"}
          </button>

          <button class="fav-btn" onclick="addToFav('${p._id}')">
            ❤️ Favorite
          </button>
        </div>
      `;
    });

    document.getElementById("products").innerHTML = html;
  })
  .catch(() => {
    document.getElementById("products").innerHTML =
      "<p>Failed to load products ❌</p>";
  });
}

// ➕ add to cart
function addToCart(id) {

  if (!user) {
    alert("Login first ❌");
    window.location.href = "login.html";
    return;
  }

  const product = productsData.find(p => p._id == id);

  if (!product || product.stock <= 0) return;

  cart.push({
    id: product._id,
    name: product.name,
    price: product.price
  });

  localStorage.setItem("cart", JSON.stringify(cart));
  updateCartUI();

  fetch("https://fark618-1.onrender.com/products/" + id, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      name: product.name,
      price: product.price,
      stock: product.stock - 1,
      image: product.image
    })
  })
  .then(() => loadProducts());
}

// ❤️ favorite
function addToFav(id) {

  if (!user) {
    alert("Login first ❌");
    return;
  }

  const product = productsData.find(p => p._id == id);

  let fav = JSON.parse(localStorage.getItem("fav")) || [];

  fav.push({
    id: product._id,
    name: product.name,
    price: product.price
  });

  localStorage.setItem("fav", JSON.stringify(fav));

  alert("Added to Favorites ❤️");
}

// 🛒 go cart
function goToCart() {
  if (!user) {
    alert("Login first ❌");
    window.location.href = "login.html";
    return;
  }
  window.location.href = "cart.html";
}

// 👤 go account
function goToAccount() {
  if (!user) {
    alert("Login first ❌");
    window.location.href = "login.html";
    return;
  }
  window.location.href = "account.html";
}

// 🚀 start
loadProducts();

</script>

</body>
</html>
