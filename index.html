<!DOCTYPE html>
<html>
<head>
<title>FARK 618</title>

<style>
body {
  font-family: 'Segoe UI';
  margin: 0;
  padding: 10px;
  background: #f1f3f6;
}

h1 { text-align: center; }
#welcome { text-align:center; color:gray; }

#banner {
  width: 100%;
  height: 220px;
  overflow: hidden;
  border-radius: 10px;
  margin-bottom: 10px;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(160px,1fr));
  gap: 10px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
  position: relative;
  cursor: pointer;
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: contain;
}

.price { color: green; }

.fav {
  position: absolute;
  top: 5px;
  right: 5px;
  background: white;
  border-radius: 50%;
  padding: 5px;
}

#bottomNav {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  background: white;
  padding: 10px;
}
</style>
</head>

<body>

<h1>FARK 618 🛍️</h1>
<h3 id="welcome"></h3>

<div id="banner"></div>
<div id="products" class="products"></div>

<div id="bottomNav">
  <div onclick="location.href='index.html'">🏠 Home</div>
  <div onclick="location.href='account.html'">👤 Account</div>
  <div onclick="location.href='cart.html'">🛒 Cart</div>
</div>

<script>

const API = "https://fark618-backend.onrender.com";

document.getElementById("welcome").innerText =
  localStorage.getItem("user") || "Guest";


// 🔥 LOAD PRODUCTS
async function loadProducts(){
  try {
    const res = await fetch(API + "/products");
    const data = await res.json();

    let html = "";

    data.forEach((p,i)=>{
      html += `
      <div class="card" onclick="openProduct(${i})">
        <div class="fav">❤️</div>
        <img src="${p.image || 'https://via.placeholder.com/200'}">
        <h4>${p.name}</h4>
        <div class="price">₹${p.price}</div>
      </div>
      `;
    });

    document.getElementById("products").innerHTML = html;

  } catch(e){
    console.log("Product error", e);
  }
}


// 🔥 OPEN PRODUCT
function openProduct(i){
  fetch(API + "/products")
  .then(r=>r.json())
  .then(d=>{
    localStorage.setItem("selectedProduct", JSON.stringify(d[i]));
    location.href="product.html";
  });
}


// 🔥 LOAD BANNER
async function loadBanner(){
  try{
    const res = await fetch(API + "/banner");
    const data = await res.json();

    if(data.type === "video"){
      document.getElementById("banner").innerHTML =
        '<video autoplay muted loop style="width:100%;height:100%;object-fit:cover">' +
        '<source src="'+data.videoUrl+'">' +
        '</video>';
    }

  }catch(e){
    console.log("Banner error", e);
  }
}


// INIT
loadProducts();
loadBanner();

</script>

</body>
</html>
