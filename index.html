<!DOCTYPE html>
<html>
<head>
  <title>My Account</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }

    button {
      padding: 8px 12px;
      border: none;
      cursor: pointer;
      margin-top: 5px;
      border-radius: 5px;
    }

    .logout {
      background: red;
      color: white;
      width: 100%;
    }

    .remove {
      background: red;
      color: white;
    }

    .order-btn {
      background: green;
      color: white;
      width: 100%;
      margin-top: 10px;
    }

    .section {
      margin-top: 25px;
    }

  </style>
</head>

<body>

<h1>👤 My Account</h1>
<h3 id="welcome"></h3>

<button class="logout" onclick="logout()">Logout</button>

<!-- 🛒 CART -->
<div class="section">
  <h2>🛒 My Cart</h2>
  <div id="cartItems"></div>
  <h3 id="total"></h3>
  <button class="order-btn" onclick="placeOrder()">Place Order</button>
</div>

<!-- 📦 ORDERS -->
<div class="section">
  <h2>📦 My Orders</h2>
  <div id="orders"></div>
</div>

<!-- ❤️ FAVORITES -->
<div class="section">
  <h2>❤️ Favorites</h2>
  <div id="favorites"></div>
</div>

<script>

const BASE_URL = "https://fark618-1.onrender.com";

let user = localStorage.getItem("user");

if (!user) {
  window.location.href = "login.html";
}

user = user.toLowerCase().trim();

document.getElementById("welcome").innerText = "Welcome, " + user;


// 🔓 LOGOUT
function logout() {
  localStorage.removeItem("user");
  window.location.href = "login.html";
}


// 🛒 LOAD CART
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function loadCart() {

  let html = "";
  let total = 0;

  if (cart.length === 0) {
    document.getElementById("cartItems").innerHTML = "<p>Cart is empty</p>";
    document.getElementById("total").innerText = "";
    return;
  }

  cart.forEach((item, index) => {

    total += Number(item.price);

    html += `
      <div class="card">
        <h3>${item.name}</h3>
        <p>₹${item.price}</p>
        <p>Size: <b>${item.size}</b></p>

        <button class="remove" onclick="removeItem(${index})">Remove</button>
      </div>
    `;
  });

  document.getElementById("cartItems").innerHTML = html;
  document.getElementById("total").innerText = "Total: ₹" + total;
}


// ❌ REMOVE CART ITEM
function removeItem(index) {
  cart.splice(index, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
  loadCart();
}


// 🛒 PLACE ORDER
function placeOrder() {

  if (cart.length === 0) {
    alert("Cart empty ❌");
    return;
  }

  let total = 0;
  cart.forEach(i => total += Number(i.price));

  fetch(BASE_URL + "/order", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      user,
      products: cart,
      total
    })
  })
  .then(res => {
    if (res.ok) {
      alert("Order placed ✅");
      localStorage.removeItem("cart");
      loadCart();
      loadOrders();
    }
  });
}


// 📦 LOAD ORDERS
function loadOrders() {

  fetch(BASE_URL + "/orders")
  .then(res => res.json())
  .then(data => {

    let html = "";

    let myOrders = data.filter(o =>
      o.user && o.user.toLowerCase().trim() === user
    );

    if (myOrders.length === 0) {
      html = "<p>No orders yet</p>";
    }

    myOrders.reverse().forEach(o => {

      let items = "";

      o.products.forEach(i => {
        items += `
          <li>
            ${i.name} - ₹${i.price}
            <br>Size: <b>${i.size}</b>
          </li>
        `;
      });

      html += `
        <div class="card">
          <p><b>Order ID:</b> ${o._id}</p>
          <p>Total: ₹${o.total}</p>
          <p>Status: ${o.status}</p>

          <ul>${items}</ul>

          <button onclick="track('${o._id}')">Track</button>
        </div>
      `;
    });

    document.getElementById("orders").innerHTML = html;

  });
}


// 🔍 TRACK
function track(id) {
  alert("Tracking Order: " + id);
}


// ❤️ FAVORITES
let fav = JSON.parse(localStorage.getItem("fav")) || [];

function loadFav() {

  let html = "";

  if (fav.length === 0) {
    html = "<p>No favorites</p>";
  }

  fav.forEach((item, i) => {
    html += `
      <div class="card">
        <h3>${item.name}</h3>
        <p>₹${item.price}</p>

        <button onclick="removeFav(${i})">Remove</button>
      </div>
    `;
  });

  document.getElementById("favorites").innerHTML = html;
}


// ❌ REMOVE FAVORITE
function removeFav(i) {
  fav.splice(i, 1);
  localStorage.setItem("fav", JSON.stringify(fav));
  loadFav();
}


// 🚀 INIT
loadCart();
loadOrders();
loadFav();

</script>

</body>
</html>
