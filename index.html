<!DOCTYPE html>
<html>
<head>
  <title>FARK 618</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
      padding-bottom: 120px;
    }

    h1 { text-align: center; }

    #cart {
      position: fixed;
      top: 20px;
      right: 20px;
      background: black;
      color: white;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
    }

    #authBtn {
      position: fixed;
      top: 20px;
      left: 20px;
      background: red;
      color: white;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
    }

    #account {
      position: fixed;
      top: 70px;
      right: 20px;
      background: green;
      color: white;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
    }

    #welcome {
      text-align: center;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .video-box iframe {
      width: 100%;
      height: 220px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    button {
      background: black;
      color: white;
      padding: 10px;
      border: none;
      margin-top: 10px;
      cursor: pointer;
    }

    .fav-btn { background: orange; }

    #bottomNav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
    }

  </style>
</head>

<body>

<div id="authBtn" onclick="handleAuth()">...</div>
<div id="account" onclick="goToAccount()">My Account 👤</div>
<h3 id="welcome"></h3>
<div id="cart" onclick="goToCart()">Cart: 0</div>

<h1>FARK 618 🛍️</h1>

<div class="video-box">
  <iframe src="https://www.youtube.com/embed/y1zCKcv2AiY?autoplay=1&mute=1"></iframe>
</div>

<div id="products" class="products"></div>

<div id="bottomNav">
  <div onclick="goHome()">🏠<br>Home</div>
  <div onclick="goToAccount()">👤<br>Account</div>
  <div onclick="goToCart()">🛒<br>Cart</div>
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let productsData = [];
const user = localStorage.getItem("user");

document.getElementById("welcome").innerText =
  user ? "Welcome, " + user : "Welcome, Guest";

document.getElementById("authBtn").innerText =
  user ? "Logout" : "Login";

function handleAuth() {
  if (user) {
    localStorage.removeItem("user");
    location.reload();
  } else {
    window.location.href = "login.html";
  }
}

function updateCartUI() {
  document.getElementById("cart").innerText = "Cart: " + cart.length;
}
updateCartUI();


// 🔥 FIXED loadProducts
function loadProducts() {

  fetch("https://fark618-1.onrender.com/products")
  .then(res => res.json())
  .then(data => {

    productsData = data;

    let html = "";

    data.forEach(p => {

      let sizeOptions = "";

      if (p.name.toLowerCase().includes("shirt")) {
        sizeOptions = `
          <option value="">Select Size</option>
          <option>S</option>
          <option>M</option>
          <option>L</option>
          <option>XL</option>
          <option>XXL</option>
        `;
      } else {
        sizeOptions = `
          <option value="">Select Size</option>
          <option>30</option>
          <option>32</option>
          <option>34</option>
          <option>36</option>
          <option>38</option>
          <option>40</option>
        `;
      }

      html += `
        <div class="card">
          <img src="${p.image || 'https://via.placeholder.com/200'}">
          <h3>${p.name}</h3>
          <p>₹${p.price}</p>
          <p>Stock: ${p.stock}</p>

          <select id="size-${p._id}">
            ${sizeOptions}
          </select>

          <button onclick="addToCart('${p._id}')">Add to Cart</button>

          <button class="fav-btn" onclick="addToFav('${p._id}')">
            ❤️ Favorite
          </button>
        </div>
      `;
    });

    document.getElementById("products").innerHTML = html;
  });
}


// 🔥 addToCart
function addToCart(id) {

  if (!user) {
    alert("Login first ❌");
    return;
  }

  const product = productsData.find(p => p._id == id);
  const size = document.getElementById("size-" + id).value;

  if (!size) {
    alert("Select size ❗");
    return;
  }

  cart.push({
    id: product._id,
    name: product.name,
    price: product.price,
    size: size
  });

  localStorage.setItem("cart", JSON.stringify(cart));
  updateCartUI();

  alert("Added to cart ✅");
}


// favorite
function addToFav(id) {

  if (!user) {
    alert("Login first ❌");
    return;
  }

  const product = productsData.find(p => p._id == id);

  let fav = JSON.parse(localStorage.getItem("fav")) || [];

  fav.push(product);

  localStorage.setItem("fav", JSON.stringify(fav));

  alert("Added ❤️");
}


// navigation
function goToCart() {
  if (!user) return alert("Login first ❌");
  window.location.href = "cart.html";
}

function goToAccount() {
  if (!user) return alert("Login first ❌");
  window.location.href = "account.html";
}

function goHome() {
  window.location.href = "index.html";
}


// start
loadProducts();

</script>

</body>
</html>
