<!DOCTYPE html>
<html>
<head>
  <title>FARK 618</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
      padding-bottom: 120px;
    }

    h1 { text-align: center; }

    #welcome {
      text-align: center;
      margin-bottom: 10px;
      font-weight: bold;
    }

    /* 🎥 VIDEO (REEL STYLE) */
    .video-box {
      margin: 20px 0;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 260px;
    }

    .video-box iframe {
      width: 150px;   /* 🔥 portrait */
      height: 100%;
      border-radius: 10px;
    }

    .close-btn {
      position: absolute;
      top: 8px;
      right: 10px;
      background: black;
      color: white;
      padding: 5px 8px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 12px;
      z-index: 10;
    }

    /* 🛍 products */
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    button {
      background: black;
      color: white;
      padding: 10px;
      border: none;
      margin-top: 10px;
      cursor: pointer;
    }

    .fav-btn { background: orange; }

    /* 🔻 Bottom Nav */
    #bottomNav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      border-top: 1px solid #ccc;
    }

    #bottomNav div {
      text-align: center;
      font-size: 14px;
      cursor: pointer;
    }

    /* 🔻 Login Bar */
    #loginBar {
      position: fixed;
      bottom: 60px;
      width: 100%;
      background: black;
      color: white;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #loginBar button {
      background: orange;
      border: none;
      padding: 8px 12px;
      color: black;
      font-weight: bold;
    }

  </style>
</head>

<body>

<h3 id="welcome"></h3>

<h1>FARK 618 🛍️</h1>

<!-- 🎥 VIDEO -->
<div class="video-box" id="videoBox">
  <div class="close-btn" onclick="closeVideo()">✖</div>

  <iframe 
    src="https://www.youtube.com/embed/y1zCKcv2AiY?autoplay=1&mute=1&loop=1&playlist=y1zCKcv2AiY"
    allow="autoplay"
    allowfullscreen>
  </iframe>
</div>

<div id="products" class="products"></div>

<!-- 🔻 Bottom Nav -->
<div id="bottomNav">
  <div onclick="goHome()">🏠<br>Home</div>
  <div onclick="goToAccount()">👤<br>Account</div>
  <div onclick="goToCart()">🛒<br>Cart</div>
</div>

<!-- 🔻 Login Bar -->
<div id="loginBar" onclick="goLogin()">
  <span>Get full access 🔓</span>
  <button>LOGIN</button>
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let productsData = [];
const user = localStorage.getItem("user");

// welcome
document.getElementById("welcome").innerText =
  user ? "Welcome, " + user : "Welcome, Guest";

// hide login bar
if (user) {
  document.getElementById("loginBar").style.display = "none";
}

// hide video permanently
if (localStorage.getItem("videoClosed") === "yes") {
  document.getElementById("videoBox").style.display = "none";
}

// ❌ close video
function closeVideo() {
  localStorage.setItem("videoClosed", "yes");
  document.getElementById("videoBox").style.display = "none";
}

// load products
function loadProducts() {
  fetch("https://fark618-1.onrender.com/products")
  .then(res => res.json())
  .then(data => {

    productsData = data;

    let html = "";

    data.forEach(p => {
      html += `
        <div class="card">
          <img src="${p.image || 'https://via.placeholder.com/200'}">
          <h3>${p.name}</h3>
          <p>₹${p.price}</p>
          <p>Stock: ${p.stock}</p>

          <button onclick="addToCart('${p._id}')">
            Add to Cart
          </button>

          <button class="fav-btn" onclick="addToFav('${p._id}')">
            ❤️ Favorite
          </button>
        </div>
      `;
    });

    document.getElementById("products").innerHTML = html;
  });
}

// add to cart
function addToCart(id) {
  if (!user) {
    alert("Login first ❌");
    window.location.href = "login.html";
    return;
  }

  const product = productsData.find(p => p._id == id);

  cart.push({
    id: product._id,
    name: product.name,
    price: product.price
  });

  localStorage.setItem("cart", JSON.stringify(cart));
}

// favorite
function addToFav(id) {
  if (!user) {
    alert("Login first ❌");
    return;
  }

  const product = productsData.find(p => p._id == id);

  let fav = JSON.parse(localStorage.getItem("fav")) || [];

  fav.push({
    id: product._id,
    name: product.name,
    price: product.price
  });

  localStorage.setItem("fav", JSON.stringify(fav));
}

// navigation
function goToCart() {
  if (!user) return alert("Login first ❌");
  window.location.href = "cart.html";
}

function goToAccount() {
  if (!user) return alert("Login first ❌");
  window.location.href = "account.html";
}

function goHome() {
  window.location.href = "index.html";
}

function goLogin() {
  window.location.href = "login.html";
}

// start
loadProducts();

</script>

</body>
</html>
