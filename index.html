<!DOCTYPE html>
<html>
<head>
  <title>My Account</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
      padding-bottom: 80px;
    }

    h1 {
      text-align: center;
    }

    /* 🔝 TOP RIGHT */
    .topbar {
      position: absolute;
      top: 20px;
      right: 20px;
    }

    .topbar button {
      margin-left: 5px;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    }

    .section {
      margin-top: 30px;
    }

    button {
      padding: 8px 12px;
      border: none;
      background: black;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    .fav {
      background: orange;
      color: black;
      font-weight: bold;
    }

    ul {
      padding-left: 20px;
    }

    .msg {
      text-align: center;
      margin-top: 30px;
      color: #777;
    }

    /* 🔻 BOTTOM NAV */
    #bottomNav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      border-top: 2px solid #ddd;
    }

    #bottomNav div {
      text-align: center;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- 🔝 TOP RIGHT -->
<div class="topbar">
  🛒 <span id="cartCount">0</span>
  <button onclick="goToCart()">Cart</button>
  <button onclick="logout()">Logout</button>
</div>

<h1>👤 My Account</h1>
<h3 id="welcome"></h3>

<!-- 📦 ORDERS -->
<div class="section">
  <h2>📦 My Orders</h2>
  <div id="orders"></div>
</div>

<!-- ❤️ FAVORITES -->
<div class="section">
  <h2>❤️ Favorite Items</h2>
  <div id="favorites"></div>
</div>

<!-- 🛒 CART -->
<div class="section">
  <h2>🛒 Cart Items</h2>
  <div id="cartItems"></div>
</div>

<!-- 🔻 BOTTOM NAV -->
<div id="bottomNav">
  <div onclick="goHome()">🏠<br>Home</div>
  <div onclick="goAccount()">👤<br>Account</div>
  <div onclick="goToCart()">🛒<br>Cart</div>
</div>

<script>

const BASE_URL = "https://fark618-1.onrender.com";

let user = localStorage.getItem("user");

// 🔐 LOGIN CHECK
if (!user) {
  document.getElementById("welcome").innerText = "Please login";
} else {
  user = user.toLowerCase().trim();
  document.getElementById("welcome").innerText = "Welcome, " + user;
  loadOrders();
  loadFavorites();
  loadCart();
}

// 🛒 CART COUNT
function updateCartCount() {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  document.getElementById("cartCount").innerText = cart.length;
}
updateCartCount();


// 📦 ORDERS
function loadOrders() {
  fetch(BASE_URL + "/orders")
    .then(res => res.json())
    .then(data => {

      let html = "";

      let myOrders = data.filter(o =>
        o.user && o.user.toLowerCase().trim() === user
      );

      if (myOrders.length === 0) {
        html = "<p>No orders yet</p>";
      } else {
        myOrders.reverse().forEach(o => {

          let itemsHtml = "";

          o.products.forEach(item => {
            itemsHtml += `
              <li>${item.name} - ₹${item.price}</li>
            `;
          });

          html += `
            <div class="card">
              <p><b>Order ID:</b> ${o._id}</p>
              <p><b>Total:</b> ₹${o.total}</p>
              <p><b>Status:</b> ${o.status}</p>
              <ul>${itemsHtml}</ul>
              <button onclick="track('${o._id}')">Track</button>
            </div>
          `;
        });
      }

      document.getElementById("orders").innerHTML = html;
    });
}

// 🔍 TRACK
function track(id) {
  window.location.href = "track.html?id=" + id;
}


// ❤️ FAVORITES
function loadFavorites() {
  let fav = JSON.parse(localStorage.getItem("fav")) || [];
  let html = fav.length === 0 ? "<p>No favorites</p>" : "";

  fav.forEach((f, i) => {
    html += `
      <div class="card">
        <h3>${f.name}</h3>
        <p>₹${f.price}</p>
      </div>
    `;
  });

  document.getElementById("favorites").innerHTML = html;
}


// 🛒 CART ITEMS
function loadCart() {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let html = cart.length === 0 ? "<p>No cart items</p>" : "";

  cart.forEach((c, i) => {
    html += `
      <div class="card">
        <h3>${c.name}</h3>
        <p>₹${c.price}</p>
        <p>Size: ${c.size}</p>
      </div>
    `;
  });

  document.getElementById("cartItems").innerHTML = html;
}


// 🔐 LOGOUT
function logout() {
  localStorage.removeItem("user");
  location.reload();
}


// 🔻 NAVIGATION
function goHome() {
  window.location.href = "index.html";
}

function goAccount() {
  window.location.href = "account.html";
}

function goToCart() {
  window.location.href = "cart.html";
}

</script>

</body>
</html>
