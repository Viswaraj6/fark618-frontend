<!DOCTYPE html>
<html>
<head>
  <title>FARK 618</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to bottom, #e3f2fd, #ffffff);
      padding: 15px;
      padding-bottom: 120px;
    }

    h1 {
      text-align: center;
      color: #333;
    }

    #welcome {
      text-align: center;
      margin-bottom: 10px;
      font-weight: bold;
      color: #444;
    }

    /* 🎥 VIDEO */
    .video-box {
      width: 100%;
      max-width: 400px;
      margin: 15px auto;
      border-radius: 15px;
      overflow: hidden;
      background: black;
    }

    .video-box iframe {
      width: 100%;
      height: 500px;
      border: none;
    }

    /* PRODUCTS */
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
    }

    select {
      padding: 8px;
      margin-top: 10px;
      border-radius: 5px;
    }

    button {
      background: black;
      color: white;
      padding: 10px;
      border: none;
      margin-top: 10px;
      cursor: pointer;
      border-radius: 5px;
    }

    .fav-btn {
      background: linear-gradient(to right, orange, gold);
      color: black;
      font-weight: bold;
    }

    /* 🔻 Bottom Nav only */
    #bottomNav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      border-top: 2px solid #ddd;
    }

    #bottomNav div {
      text-align: center;
      font-size: 14px;
      cursor: pointer;
    }

  </style>
</head>

<body>

<h3 id="welcome"></h3>

<h1>FARK 618 🛍️</h1>

<!-- VIDEO -->
<div class="video-box">
  <iframe 
    src="https://www.youtube.com/embed/y1zCKcv2AiY?autoplay=1&mute=1&playsinline=1"
    allow="autoplay"
    allowfullscreen>
  </iframe>
</div>

<div id="products" class="products"></div>

<!-- 🔻 Bottom Nav -->
<div id="bottomNav">
  <div onclick="goHome()">🏠<br>Home</div>
  <div onclick="goToAccount()">👤<br>Account</div>
  <div onclick="goToCart()">🛒<br>Cart</div>
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let productsData = [];
const user = localStorage.getItem("user");

document.getElementById("welcome").innerText =
  user ? "Welcome, " + user : "Welcome, Guest";

function updateCartUI() {
  // no top cart now
}
updateCartUI();


// 🔥 LOAD PRODUCTS
function loadProducts() {

  fetch("https://fark618-1.onrender.com/products")
  .then(res => res.json())
  .then(data => {

    productsData = data;
    let html = "";

    data.forEach(p => {

      let sizeOptions = "";

      if (p.sizes && p.sizes.length > 0) {
        sizeOptions = `<option value="">Select Size</option>`;
        p.sizes.forEach(s => {
          sizeOptions += `<option>${s}</option>`;
        });
      }

      html += `
        <div class="card">
          <img src="${p.image || 'https://via.placeholder.com/200'}">
          <h3>${p.name}</h3>
          <p>₹${p.price}</p>
          <p>Stock: ${p.stock}</p>

          <select id="size-${p._id}">
            ${sizeOptions}
          </select>

          <button onclick="addToCart('${p._id}')">Add to Cart</button>

          <button class="fav-btn" onclick="addToFav('${p._id}')">
            ❤️ Favorite
          </button>
        </div>
      `;
    });

    document.getElementById("products").innerHTML = html;
  });
}


// 🔥 ADD TO CART (NO ALERT)
function addToCart(id) {

  if (!user) {
    alert("Login first ❌");
    return;
  }

  const product = productsData.find(p => p._id == id);
  const size = document.getElementById("size-" + id).value;

  if (!size) {
    alert("Select size ❗");
    return;
  }

  cart.push({
    id: product._id,
    name: product.name,
    price: product.price,
    size: size
  });

  localStorage.setItem("cart", JSON.stringify(cart));

  // 🔥 NO ALERT
}


// ❤️ FAVORITE
function addToFav(id) {

  if (!user) {
    alert("Login first ❌");
    return;
  }

  const product = productsData.find(p => p._id == id);

  let fav = JSON.parse(localStorage.getItem("fav")) || [];

  fav.push(product);

  localStorage.setItem("fav", JSON.stringify(fav));
}


// NAVIGATION
function goToCart() {
  if (!user) return alert("Login first ❌");
  window.location.href = "cart.html";
}

function goToAccount() {
  if (!user) return alert("Login first ❌");
  window.location.href = "account.html";
}

function goHome() {
  window.location.href = "index.html";
}


// INIT
loadProducts();

</script>

</body>
</html>
