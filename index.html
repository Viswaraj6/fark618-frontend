<!DOCTYPE html>
<html>
<head>
  <title>FARK 618</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f1f3f6;
      margin: 0;
      padding: 10px;
      padding-bottom: 90px;
    }

    h1 {
      text-align: center;
      margin-bottom: 5px;
    }

    #welcome {
      text-align: center;
      color: gray;
      margin-bottom: 10px;
    }

    /* 🔥 VIDEO BANNER */
  .video-banner video {
  width: 100%;
  max-height: 300px;
  object-fit: contain;
  background: black;
}
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 15px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: contain;
      border-radius: 8px;
    }

    .name {
      font-weight: 600;
      margin-top: 8px;
    }

    .price {
      color: green;
      font-weight: bold;
    }

    .stock {
      font-size: 12px;
      color: gray;
    }

    select {
      width: 100%;
      padding: 6px;
      margin-top: 6px;
    }

    button {
      width: 100%;
      padding: 8px;
      margin-top: 6px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .cart-btn {
      background: black;
      color: white;
    }

    .fav-btn {
      background: orange;
      color: white;
    }

    #bottomNav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 10px;
      border-top: 1px solid #ccc;
    }
  </style>
</head>

<body>

<h1>FARK 618 🛍️</h1>
<h3 id="welcome"></h3>

<!-- 🔥 VIDEO BANNER -->
<div class="video-banner">
 <video id="bannerVideo" autoplay muted loop playsinline></video>
</div>

<div id="products" class="products"></div>

<div id="bottomNav">
  <div onclick="goHome()">🏠<br>Home</div>
  <div onclick="goAccount()">👤<br>Account</div>
  <div onclick="goCart()">🛒<br>Cart</div>
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let productsData = [];
let user = localStorage.getItem("user");

document.getElementById("welcome").innerText =
  user ? "Welcome, " + user : "Welcome, Guest";


async function loadProducts() {

  const res = await fetch("https://fark618-backend.onrender.com/products");
  const data = await res.json();

  productsData = data;

  let html = "";

  data.forEach((p, index) => {

    let sizes = Array.isArray(p.sizes) ? p.sizes : (p.sizes || "").split(",");

    let options = `<option value="">Select Size</option>`;
    sizes.forEach(s => {
      options += `<option value="${s.trim()}">${s.trim()}</option>`;
    });

    html += `
      <div class="card">

        <img
          src="${p.image || 'https://via.placeholder.com/200'}"
          onclick="openProduct(${index})"
        >

        <div class="name">${p.name}</div>
        <div class="price">₹${p.price}</div>
        <div class="stock">Stock: ${p.stock}</div>

        <select id="size-${index}">
          ${options}
        </select>

        <button class="cart-btn" onclick="addToCart(${index})">
          Add to Cart
        </button>

        <button class="fav-btn" onclick="addToFav(${index})">
          ❤️ Favorite
        </button>

      </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

function openProduct(index){
  localStorage.setItem("selectedProduct", JSON.stringify(productsData[index]));
  location.href = "product.html";
}

function addToCart(index) {
  if (!user) return alert("Login first ❌");

  const size = document.getElementById("size-" + index).value;
  if (!size) return alert("Select size ❗");

  const p = productsData[index];

  cart.push({ id:p._id, name:p.name, price:p.price, size });
  localStorage.setItem("cart", JSON.stringify(cart));

  alert("Added to cart ✅");
}

function addToFav(index){
  let fav = JSON.parse(localStorage.getItem("fav")) || [];
  fav.push(productsData[index]);
  localStorage.setItem("fav", JSON.stringify(fav));
  alert("Added ❤️");
}

function goHome(){ location.href="index.html"; }
function goAccount(){ location.href="account.html"; }
function goCart(){ location.href="cart.html"; }

loadProducts();
async function loadBannerVideo(){

  const res = await fetch("https://fark618-backend.onrender.com/video");
  const data = await res.json();

  const video = document.getElementById("bannerVideo");

  if(data.url){
    video.src = data.url;
  } else {
    video.src = "https://www.w3schools.com/html/mov_bbb.mp4";
  }
}

loadBannerVideo();
</script>

</body>
</html>
