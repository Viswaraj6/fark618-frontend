<!DOCTYPE html>
<html>
<head>
  <title>FARK 618</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f1f3f6;
      margin: 0;
      padding: 10px;
      padding-bottom: 90px;
    }

    h1 {
      text-align: center;
      margin-bottom: 5px;
    }

    #welcome {
      text-align: center;
      color: gray;
      margin-bottom: 10px;
    }

    /* 🔥 VIDEO BANNER */
 .video-banner {
  width: 100%;
  height: 220px;
  overflow: hidden;
  border-radius: 10px;
}

.video-banner video {
  width: 100%;
  height: 100%;
  object-fit: cover; /* 🔥 full fill */
}
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 15px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: contain;
      border-radius: 8px;
    }

    .name {
      font-weight: 600;
      margin-top: 8px;
    }

    .price {
      color: green;
      font-weight: bold;
    }

    .stock {
      font-size: 12px;
      color: gray;
    }

    select {
      width: 100%;
      padding: 6px;
      margin-top: 6px;
    }

    button {
      width: 100%;
      padding: 8px;
      margin-top: 6px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .cart-btn {
      background: black;
      color: white;
    }

    .fav-btn {
      background: orange;
      color: white;
    }

    #bottomNav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 10px;
      border-top: 1px solid #ccc;
    }
    .slider {
  display: flex;
  overflow-x: auto;
  gap: 10px;
}

.slider img {
  height: 250px;
  border-radius: 10px;
}
.card {
  position: relative; /* 🔥 must */
}

.fav-icon {
  position: absolute;
  top: 8px;
  right: 8px;
  background: white;
  border-radius: 50%;
  padding: 6px 8px;
  cursor: pointer;
  font-size: 18px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  transition: 0.3s;
}

.fav-icon:hover {
  transform: scale(1.2);
  color: red;
}  
.card {
  transition: 0.3s;
  cursor: pointer;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}    
  </style>
</head>

<body>

<h1>FARK 618 🛍️</h1>
<h3 id="welcome"></h3>

<!-- 🔥 VIDEO BANNER -->
<div id="banner"></div>
<div id="products" class="products"></div>

<div id="bottomNav">
  <div onclick="goHome()">🏠<br>Home</div>
  <div onclick="goAccount()">👤<br>Account</div>
  <div onclick="goCart()">🛒<br>Cart</div>
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let productsData = [];
let user = localStorage.getItem("user");

document.getElementById("welcome").innerText =
  user ? "Welcome, " + user : "Welcome, Guest";


async function loadProducts() {

  const res = await fetch("https://fark618-backend.onrender.com/products");
  const data = await res.json();

  productsData = data;

  let html = "";

  data.forEach((p, index) => {

    let sizes = Array.isArray(p.sizes) ? p.sizes : (p.sizes || "").split(",");

    let options = `<option value="">Select Size</option>`;
    sizes.forEach(s => {
      options += `<option value="${s.trim()}">${s.trim()}</option>`;
    });

  html += `
  <div class="card" onclick="openProduct(${index})">

  <div class="fav-icon" onclick="event.stopPropagation(); toggleFav(${index})">
   ${isFav(p._id || index) ? "❤️" : "🤍"}
  </div>

  <img src="${p.image || 'https://via.placeholder.com/200'}">

  <div class="name">${p.name}</div>
  <div class="price">₹${p.price}</div>
  <div class="stock">Stock: ${p.stock}</div>

</div>
  });

  document.getElementById("products").innerHTML = html;
}

function openProduct(index){
  localStorage.setItem("selectedProduct", JSON.stringify(productsData[index]));
  location.href = "product.html";
}

function addToCart(index) {
  if (!user) return alert("Login first ❌");

  const size = document.getElementById("size-" + index).value;
  if (!size) return alert("Select size ❗");

  const p = productsData[index];

  cart.push({ id:p._id, name:p.name, price:p.price, size });
  localStorage.setItem("cart", JSON.stringify(cart));

  alert("Added to cart ✅");
}


function goHome(){ location.href="index.html"; }
function goAccount(){ location.href="account.html"; }
function goCart(){ location.href="cart.html"; }

loadProducts();
  function getFav(){
  return JSON.parse(localStorage.getItem("fav")) || [];
}

function isFav(id){
  return getFav().some(p => p._id === id);
}

function toggleFav(index){

  let fav = getFav();
  const p = productsData[index];

  const exist = fav.find(item => item._id === p._id);

  if(exist){
    fav = fav.filter(item => item._id !== p._id);
  } else {
    fav.push(p);
  }

  localStorage.setItem("fav", JSON.stringify(fav));

  loadProducts(); // 🔥 refresh UI
}
  async function loadBanner(){

  const res = await fetch("https://fark618-backend.onrender.com/banner");
  const data = await res.json();

  let html = "";

  // 🎬 VIDEO
  if(data.type === "video"){
    html = `
      <video autoplay muted loop playsinline style="width:100%;height:250px;object-fit:cover;border-radius:10px;">
        <source src="${data.videoUrl}">
      </video>
    `;
  }

  // 🖼 SLIDER
  else if(data.type === "slider"){
    html = `
      <div class="slider">
        ${data.images.map(img => `<img src="${img}">`).join("")}
      </div>
    `;
  }

  document.getElementById("banner").innerHTML = html;
}

loadBanner();
</script>

</body>
</html>
