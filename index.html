<!DOCTYPE html>
<html>
<head>
  <title>FARK 618</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #eef2f7;
      margin: 0;
      padding: 15px;
      padding-bottom: 90px;
    }

    h1 {
      text-align: center;
      color: #222;
      margin-bottom: 20px;
    }

    #welcome {
      text-align: center;
      margin-bottom: 10px;
      font-weight: 600;
      color: #444;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
    }

    .card {
      background: #fff;
      padding: 15px;
      border-radius: 15px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.08);
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
    }

    .title { font-weight: bold; }
    .price { color: green; }
    .stock { font-size: 13px; }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .cart-btn { background: black; color: white; }
    .fav-btn { background: orange; }

    #bottomNav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 10px;
    }
  </style>
</head>

<body>

<h1>FARK 618 🛍️</h1>
<h3 id="welcome"></h3>

<div id="products" class="products"></div>

<div id="bottomNav">
  <div onclick="goHome()">🏠<br>Home</div>
  <div onclick="goAccount()">👤<br>Account</div>
  <div onclick="goCart()">🛒<br>Cart</div>
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let productsData = [];
let user = localStorage.getItem("user");

document.getElementById("welcome").innerText =
  user ? "Welcome, " + user : "Welcome, Guest";

// 🔥 LOAD PRODUCTS
function loadProducts() {
  fetch("https://fark618-backend.onrender.com/products")
  .then(res => res.json())
  .then(data => {

    productsData = data;
    let html = "";

    data.forEach(p => {

      let sizes = p.sizes || [];
      let options = `<option value="">Select Size</option>`;

      sizes.forEach(s => {
        options += `<option>${s}</option>`;
      });

      html += `
        <div class="card">
          <img src="${p.image || 'https://via.placeholder.com/200'}"
               onclick="openProduct('${p._id}')">

          <div class="title">${p.name}</div>
          <div class="price">₹${p.price}</div>
          <div class="stock">Stock: ${p.stock}</div>

          <select id="size-${p._id}">
            ${options}
          </select>

          <button class="cart-btn" onclick="addToCart('${p._id}')">
            Add to Cart
          </button>

          <button class="fav-btn" onclick="addToFav('${p._id}')">
            ❤️ Favorite
          </button>
        </div>
      `;
    });

    document.getElementById("products").innerHTML = html;
  });
}

// 🔥 OPEN PRODUCT PAGE
function openProduct(id){
  const product = productsData.find(p => p._id == id);
  localStorage.setItem("selectedProduct", JSON.stringify(product));
  window.location.href = "product.html";
}

// 🔥 ADD TO CART
function addToCart(id) {

  if (!user) {
    alert("Login first ❌");
    return;
  }

  const product = productsData.find(p => p._id == id);
  const size = document.getElementById("size-" + id).value;

  if (!size) {
    alert("Select size ❗");
    return;
  }

  cart.push({
    id: product._id,
    name: product.name,
    price: product.price,
    size: size
  });

  localStorage.setItem("cart", JSON.stringify(cart));
}

// ❤️ FAVORITE
function addToFav(id) {

  if (!user) {
    alert("Login first ❌");
    return;
  }

  const product = productsData.find(p => p._id == id);
  let fav = JSON.parse(localStorage.getItem("fav")) || [];

  fav.push(product);
  localStorage.setItem("fav", JSON.stringify(fav));
}

// NAV
function goHome(){ location.href = "index.html"; }
function goAccount(){ location.href = "account.html"; }
function goCart(){ location.href = "cart.html"; }

loadProducts();

</script>

</body>
</html>
