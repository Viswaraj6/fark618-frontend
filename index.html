<!DOCTYPE html>
<html>
<head>
  <title>FARK 618</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #eef2f7;
      margin: 0;
      padding: 15px;
      padding-bottom: 90px;
    }

    h1 { text-align: center; }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
    }

    .card {
      background: #fff;
      padding: 15px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 5px 12px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .cart-btn { background: black; color: white; }
    .fav-btn { background: orange; }

    #bottomNav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 10px;
    }
  </style>
</head>

<body>

<h1>FARK 618 🛍️</h1>
<h3 id="welcome"></h3>

<div id="products" class="products"></div>

<div id="bottomNav">
  <div onclick="goHome()">🏠<br>Home</div>
  <div onclick="goAccount()">👤<br>Account</div>
  <div onclick="goCart()">🛒<br>Cart</div>
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let productsData = [];
let user = localStorage.getItem("user");

document.getElementById("welcome").innerText =
  user ? "Welcome, " + user : "Welcome, Guest";


// 🔥 LOAD PRODUCTS
async function loadProducts() {
  try {
    const res = await fetch("https://fark618-backend.onrender.com/products");
    const data = await res.json();

    productsData = data;

    let html = "";

    data.forEach((p, index) => {

      let sizes = p.sizes || [];
      let options = `<option value="">Select Size</option>`;

      sizes.forEach(s => {
        options += `<option>${s}</option>`;
      });

      html += `
        <div class="card">
          <img src="${p.image || 'https://via.placeholder.com/200'}"
               onclick="openProduct(${index})">

          <div><b>${p.name}</b></div>
          <div style="color:green">₹${p.price}</div>
          <div>Stock: ${p.stock}</div>

          <select id="size-${index}">
            ${options}
          </select>

          <button class="cart-btn" onclick="addToCart(${index})">
            Add to Cart
          </button>

          <button class="fav-btn" onclick="addToFav(${index})">
            ❤️ Favorite
          </button>
        </div>
      `;
    });

    document.getElementById("products").innerHTML = html;

  } catch (err) {
    alert("Server loading slow ⚠️ Try again");
  }
}


// 🔥 OPEN PRODUCT (SAFE VERSION)
function openProduct(index){

  const product = productsData[index];

  if(!product){
    alert("Product not loaded ❌");
    return;
  }

  localStorage.setItem("selectedProduct", JSON.stringify(product));

  window.location.href = "product.html";
}


// 🔥 ADD TO CART
function addToCart(index) {

  if (!user) {
    alert("Login first ❌");
    return;
  }

  const product = productsData[index];
  const size = document.getElementById("size-" + index).value;

  if (!size) {
    alert("Select size ❗");
    return;
  }

  cart.push({
    id: product._id,
    name: product.name,
    price: product.price,
    size: size
  });

  localStorage.setItem("cart", JSON.stringify(cart));

  alert("Added to cart ✅");
}


// ❤️ FAVORITE
function addToFav(index) {

  const product = productsData[index];
  let fav = JSON.parse(localStorage.getItem("fav")) || [];

  fav.push(product);
  localStorage.setItem("fav", JSON.stringify(fav));

  alert("Added to favorite ❤️");
}


// NAV
function goHome(){ location.href = "index.html"; }
function goAccount(){ location.href = "account.html"; }
function goCart(){ location.href = "cart.html"; }


loadProducts();

</script>

</body>
</html>
