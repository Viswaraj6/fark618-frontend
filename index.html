<!DOCTYPE html>
<html>
<head>
  <title>FARK 618</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 15px;
      padding-bottom: 100px;
    }

    h1 { text-align: center; }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    button {
      padding: 8px;
      margin-top: 8px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    #bottomNav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      border-top: 1px solid #ccc;
    }
  </style>
</head>

<body>

<h1>FARK 618 🛍️</h1>

<div id="products" class="products"></div>

<div id="bottomNav">
  <div onclick="goHome()">🏠<br>Home</div>
  <div onclick="goAccount()">👤<br>Account</div>
  <div onclick="goCart()">🛒<br>Cart</div>
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let productsData = [];

// LOAD PRODUCTS
function loadProducts() {
  fetch("https://fark618-1.onrender.com/products")
  .then(res => res.json())
  .then(data => {

    productsData = data;
    let html = "";

    data.forEach(p => {
      html += `
        <div class="card">
          <h3>${p.name}</h3>
          <p>₹${p.price}</p>
          <button onclick="addToCart('${p._id}')">Add to Cart</button>
        </div>
      `;
    });

    document.getElementById("products").innerHTML = html;
  });
}

// ADD TO CART (FIXED FORMAT)
function addToCart(id) {
  const product = productsData.find(p => p._id == id);

  cart.push({
    name: product.name,
    price: product.price,
    size: "Free Size"
  });

  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Added to cart");
}

// NAVIGATION FIX
function goHome() {
  window.location.href = "/";
}

function goAccount() {
  window.location.href = "account.html";
}

function goCart() {
  window.location.href = "cart.html";
}

loadProducts();

</script>

</body>
</html>
