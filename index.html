<!DOCTYPE html>
<html>
<head>
  <title>FARK 618</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    #cart {
      position: fixed;
      top: 20px;
      right: 20px;
      background: black;
      color: white;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
    }

    #logout {
      position: fixed;
      top: 20px;
      left: 20px;
      background: red;
      color: white;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
    }

    /* ✅ My Account */
    #account {
      position: fixed;
      top: 70px;
      right: 20px;
      background: green;
      color: white;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
    }

    #welcome {
      text-align: center;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    button {
      background: black;
      color: white;
      padding: 10px;
      border: none;
      margin-top: 10px;
      cursor: pointer;
    }

    button:disabled {
      background: grey;
    }

    .fav-btn {
      background: orange;
    }
  </style>
</head>

<body>

<!-- 🔐 LOGIN CHECK -->
<script>
if (!localStorage.getItem("user")) {
  window.location.href = "login.html";
}
</script>

<!-- 🔴 Logout -->
<div id="logout" onclick="logout()">Logout</div>

<!-- 🟢 My Account -->
<div id="account" onclick="goToAccount()">My Account 👤</div>

<!-- 👤 Welcome -->
<h3 id="welcome"></h3>

<!-- 🛒 Cart -->
<div id="cart" onclick="goToCart()">Cart: 0</div>

<h1>FARK 618 🛍️</h1>

<div id="products" class="products"></div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let productsData = [];

// 👤 username
document.getElementById("welcome").innerText =
  "Welcome, " + localStorage.getItem("user");

// 🔴 logout
function logout() {
  localStorage.removeItem("user");
  window.location.href = "login.html";
}

// 🛒 cart update
function updateCartUI() {
  document.getElementById("cart").innerText = "Cart: " + cart.length;
}
updateCartUI();

// 📦 load products
function loadProducts() {
  fetch("https://fark618-1.onrender.com/products")
  .then(res => res.json())
  .then(data => {

    productsData = data;

    let html = "";

    data.forEach(p => {
      html += `
        <div class="card">
          <img src="${p.image || 'https://via.placeholder.com/200'}">
          <h3>${p.name}</h3>
          <p>₹${p.price}</p>
          <p>Stock: ${p.stock}</p>

          <button onclick="addToCart('${p._id}')"
            ${p.stock == 0 ? "disabled" : ""}>
            ${p.stock == 0 ? "Out of Stock" : "Add to Cart"}
          </button>

          <button class="fav-btn" onclick="addToFav('${p._id}')">
            ❤️ Favorite
          </button>
        </div>
      `;
    });

    document.getElementById("products").innerHTML = html;
  })
  .catch(err => {
    console.log(err);
    document.getElementById("products").innerHTML =
      "<p>Failed to load products ❌</p>";
  });
}

// ➕ add to cart
function addToCart(id) {

  const product = productsData.find(p => p._id == id);

  if (!product) return;

  if (product.stock <= 0) {
    alert("Out of stock ❌");
    return;
  }

  cart.push({
    id: product._id,
    name: product.name,
    price: product.price,
    image: product.image
  });

  localStorage.setItem("cart", JSON.stringify(cart));

  updateCartUI();

  fetch("https://fark618-1.onrender.com/products/" + id, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      name: product.name,
      price: product.price,
      stock: product.stock - 1,
      image: product.image
    })
  })
  .then(() => loadProducts());
}

// ❤️ add to favorite
function addToFav(id) {

  const product = productsData.find(p => p._id == id);

  let fav = JSON.parse(localStorage.getItem("fav")) || [];

  fav.push({
    id: product._id,
    name: product.name,
    price: product.price
  });

  localStorage.setItem("fav", JSON.stringify(fav));

  alert("Added to Favorites ❤️");
}

// 🛒 cart page
function goToCart() {
  window.location.href = "cart.html";
}

// 👤 account page
function goToAccount() {
  window.location.href = "account.html";
}

// 🚀 start
loadProducts();

</script>

</body>
</html>
