<!DOCTYPE html>
<html>
<head>
<title>Product Details</title>
<style>
body{ font-family: Arial; padding:20px; }
.main-img{ width:300px; border-radius:10px; }
.thumb{ width:60px; margin:5px; cursor:pointer; }
</style>
</head>
<body>

<h2 id="name"></h2>

<img id="mainImg" class="main-img">

<div id="gallery"></div>

<br>

<select id="size"></select>

<p id="price"></p>
<p id="stock"></p>
<p id="fabric"></p>

<button onclick="addToCart()">Add to Cart</button>

<script>

const product = JSON.parse(localStorage.getItem("selectedProduct"));

document.getElementById("name").innerText = product.name;
document.getElementById("price").innerText = "₹" + product.price;
document.getElementById("stock").innerText = "Stock: " + product.stock;

// 👉 main image
document.getElementById("mainImg").src = product.image;

// 👉 fabric (manual or backend later)
document.getElementById("fabric").innerText = "Fabric: Cotton";

// 👉 sizes
const sizeSelect = document.getElementById("size");

(product.sizes || []).forEach(s=>{
  const opt = document.createElement("option");
  opt.innerText = s;
  sizeSelect.appendChild(opt);
});

// 👉 add to cart
function addToCart(){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  cart.push({
    ...product,
    selectedSize: document.getElementById("size").value
  });

  localStorage.setItem("cart", JSON.stringify(cart));

  alert("Added to cart ✅");
}

</script>

</body>
</html>
