<!DOCTYPE html>
<html>
<head>
<title>Product</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body {
  font-family: 'Segoe UI';
  margin: 0;
  background: #d8f3f0;
  padding-bottom: 90px;
}

.container {
  padding: 10px;
}

.main-img {
  width: 100%;
  height: 280px;
  object-fit: contain;
  background: white;
  border-radius: 10px;
}

.thumbs {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.thumbs img {
  width: 70px;
  border-radius: 6px;
  cursor: pointer;
}

h2 { margin: 10px 0 5px; }

.price {
  color: green;
  font-size: 22px;
  font-weight: bold;
}

.sizes {
  display: flex;
  gap: 10px;
  margin: 10px 0;
}

.size {
  padding: 8px 12px;
  border: 1px solid #ccc;
  border-radius: 6px;
  cursor: pointer;
}

.size.active {
  border: 2px solid black;
}

/* bottom bar */
.bottom-bar {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
}

.cart-btn {
  flex: 1;
  padding: 15px;
  background: black;
  color: white;
  border: none;
}

.buy-btn {
  flex: 1;
  padding: 15px;
  background: orange;
  border: none;
  font-weight: bold;
}

/* similar */
.similar {
  margin-top: 20px;
}

.similar-grid {
  display: flex;
  gap: 10px;
  overflow-x: auto;
}

.similar-card {
  min-width: 140px;
  background: white;
  padding: 8px;
  border-radius: 10px;
  text-align: center;
}
  .header{
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 15px;
  background: #fff;
  position: sticky;
  top: 0;
  z-index: 1000;
  border-bottom: 1px solid #ddd;
}

.menu-left{
  display: flex;
  gap: 15px;
  font-size: 14px;
    width: 100px;
}

.logo-center{
  font-size: 22px;
  font-weight: bold;
   text-align: center;
  flex: 1;
}
/* 🔥 LOGO TEXT */
.logo-text{
  font-size: 28px;
  font-weight: bold;
  letter-spacing: .0px;
}

/* 🔥 R flip */
.flip-r{
  display: inline-block;
  transform: scaleX(-1);
}

/* 🔥 LINE + 618 SAME ROW */
.logo-bottom{
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 2px;
 gap: 1px;
}

/* 🔥 LINE */
.line{
  flex: 1;
  height: 2px;
  background: black;
  margin: 0 8px;
  max-width: 20px;
}

/* 🔥 618 */
.num{
  font-size: 14px;
  letter-spacing: 3px;
}
.menu-right{
  display: flex;
  gap: 15px;
  align-items: center;
   width: 100px;
  justify-content: flex-end;
}

.icon{
  font-size: 18px;
  cursor: pointer;
  position: relative;
}
.icon i{
  font-size: 18px;
  color: #111;
  transition: 0.3s;
}

.icon:hover i{
  color: #ff3f6c;  /* 🔥 hover effect */
}
  .icon:hover .fa-heart{
  font-weight: 900;
}
.cart span{
  position: absolute;
  top: -6px;
  right: -8px;
  background: red;
  color: white;
  font-size: 10px;
  padding: 2px 5px;
  border-radius: 50%;
}
</style>

</head>

<body>
<div class="header">

  <div class="menu-left"></div>

  <div class="logo-center">
    <div class="logo-text">
      F A <span class="flip-r">R</span> K
    </div>

    <div class="logo-bottom">
      <span class="line"></span>
      <span class="num">618</span>
      <span class="line"></span>
    </div>
  </div>

  <div class="menu-right">

    <div class="icon">
      <i class="fa-solid fa-magnifying-glass"></i>
    </div>

    <div class="icon" onclick="goPage('wishlist.html')">
      <i class="fa-regular fa-heart"></i>
    </div>

    <div class="icon" onclick="goPage('account.html')">
      <i class="fa-regular fa-user"></i>
    </div>

    <div class="icon cart" onclick="goPage('cart.html')">
      <i class="fa-solid fa-bag-shopping"></i>
      <span id="cartCount">0</span>
    </div>

  </div>

</div>
<div class="container">

  <img id="mainImage" class="main-img">

  <div id="thumbs" class="thumbs"></div>

  <h2 id="name"></h2>
  <div class="price" id="price"></div>

  <!-- SIZE -->
  <h3>Select Size</h3>
  <div id="sizes" class="sizes"></div>

  <!-- DETAILS -->
  <p><b>Brand:</b> <span id="brand"></span></p>
  <p><b>Description:</b> <span id="desc"></span></p>
<h3>Specifications</h3>
<div id="specs"></div>
  <!-- SIMILAR -->
  <div class="similar">
    <h3>Similar Products</h3>
    <div id="similar" class="similar-grid"></div>
  </div>

</div>

<div class="bottom-bar">
  <button class="cart-btn" onclick="addToCart()">Add to Cart</button>
  <button class="buy-btn" onclick="buyNow()">Buy Now</button>
</div>

<script>

const API = "https://fark618-backend.onrender.com";

const product = JSON.parse(localStorage.getItem("selectedProduct"));

document.getElementById("name").innerText = product.name;
document.getElementById("price").innerText = "₹" + product.price;
document.getElementById("brand").innerText = product.brand || "FARK";
document.getElementById("desc").innerText = product.description || "-";
document.getElementById("specs").innerHTML = `
  <p><b>Brand:</b> ${product.brand || "-"}</p>
  <p><b>Fabric:</b> ${product.fabric || "-"}</p>
  <p><b>Type:</b> ${product.typeDetail || "-"}</p>
  <p><b>Fit:</b> ${product.fit || "-"}</p>
  <p><b>Pattern:</b> ${product.pattern || "-"}</p>
  <p><b>Color:</b> ${product.color || "-"}</p>
  <p><b>Occasion:</b> ${product.occasion || "-"}</p>
`;
// IMAGE
let images = [];

if(product.images && product.images.length > 0){
  images = product.images;
} 
else if(product.image){
  images = [product.image];
} 
else {
  images = ["https://via.placeholder.com/300"];
}
document.getElementById("mainImage").src = images[0];

let thumbsHTML = "";
images.forEach(img=>{
  thumbsHTML += `<img src="${img}" onclick="changeImage('${img}')">`;
});
document.getElementById("thumbs").innerHTML = thumbsHTML;

function changeImage(src){
  document.getElementById("mainImage").src = src;
}

// SIZE
let selectedSize = "";

let sizeHTML = "";
(product.sizes || []).forEach(s=>{
  sizeHTML += `<div class="size" onclick="selectSize(this,'${s}')">${s}</div>`;
});
document.getElementById("sizes").innerHTML = sizeHTML;

function selectSize(el,size){
  document.querySelectorAll(".size").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");
  selectedSize = size;
}

// CART
function addToCart(){
  if(!selectedSize){
    alert("Select size ❗");
    return;
  }

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  cart.push({
    name: product.name,
    price: product.price,
    size: selectedSize,
   image: product.images?.[0] || product.image
  });

  localStorage.setItem("cart", JSON.stringify(cart));

  alert("Added to cart ✅");
}

// BUY
function buyNow(){
  if(!selectedSize){
    alert("Select size ❗");
    return;
  }

  localStorage.setItem("checkout", JSON.stringify({
    ...product,
    size: selectedSize
  }));

  location.href = "checkout.html";
}

// SIMILAR PRODUCTS
async function loadSimilar(){
  const res = await fetch(API + "/products");
  const data = await res.json();

  let html = "";

  data
  .filter(p => p.category === product.category && p._id !== product._id)
  .slice(0,5)
  .forEach(p=>{
    html += `
      <div class="similar-card" onclick="openProduct('${p._id}')">
       <img src="${p.images?.[0] || p.image}" width="100%">
        <p>${p.name}</p>
        <b>₹${p.price}</b>
      </div>
    `;
  });

  document.getElementById("similar").innerHTML = html;
}
function updateCartCount(){
  const cart = JSON.parse(localStorage.getItem("cart")) || [];
  document.getElementById("cartCount").innerText = cart.length;
}
updateCartCount();
  function goPage(page){
  window.location.href = page;
}
function openProduct(id){
  fetch(API + "/products")
  .then(r=>r.json())
  .then(data=>{
    const p = data.find(x=>x._id===id);
    localStorage.setItem("selectedProduct", JSON.stringify(p));
    location.reload();
  });
}

loadSimilar();

</script>

</body>
</html>
