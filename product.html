<!DOCTYPE html>
<html>
<head>
<title>Product</title>

<style>
  body {
    font-family: 'Segoe UI';
    margin: 0;
    background: #f5f5f5;
  }

  .container {
    padding: 15px;
  }

  .main-img {
    width: 100%;
    height: 300px;
    object-fit: cover;
    border-radius: 10px;
  }

  .thumbs {
    display: flex;
    gap: 10px;
    margin-top: 10px;
  }

  .thumbs img {
    width: 70px;
    height: 70px;
    border-radius: 6px;
    cursor: pointer;
  }

  .price {
    color: green;
    font-size: 22px;
    font-weight: bold;
  }

  .bottom-bar {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
  }

  .cart-btn {
    flex: 1;
    padding: 15px;
    background: black;
    color: white;
    border: none;
  }

  .buy-btn {
    flex: 1;
    padding: 15px;
    background: orange;
    border: none;
    font-weight: bold;
  }
</style>

</head>

<body>

<div class="container">

  <img id="mainImage" class="main-img">

  <div id="thumbs" class="thumbs"></div>

  <h2 id="name"></h2>
  <div class="price" id="price"></div>

  <p><b>Fabric:</b> Rayon</p>
  <p><b>Type:</b> Kurta Set</p>
  <p><b>Occasion:</b> Festive</p>

</div>

<div class="bottom-bar">
  <button class="cart-btn" onclick="addToCart()">Add to Cart</button>
  <button class="buy-btn" onclick="buyNow()">Buy at ₹999</button>
</div>

<script>

const product = JSON.parse(localStorage.getItem("selectedProduct"));

document.getElementById("name").innerText = product.name;
document.getElementById("price").innerText = "₹" + product.price;

let images = product.images || [product.image];

// main image
document.getElementById("mainImage").src = images[0];

// thumbnails
let thumbsHTML = "";
images.forEach(img => {
  thumbsHTML += `<img src="${img}" onclick="changeImage('${img}')">`;
});
document.getElementById("thumbs").innerHTML = thumbsHTML;

function changeImage(src){
  document.getElementById("mainImage").src = src;
}

function addToCart(){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  cart.push(product);

  localStorage.setItem("cart", JSON.stringify(cart));

  alert("Added to cart ✅");
}

function buyNow(){
  alert("Proceed to payment 💳");
}

</script>

</body>
</html>
