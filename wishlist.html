<!DOCTYPE html>
<html>
<head>
<title>Wishlist ❤️</title>

<style>
body {
  font-family: Arial;
  background:#f5f5f5;
  padding:15px;
}

h2{
  text-align:center;
}

#wishlist{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:15px;
}

.card {
  background:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.card img {
  width:100%;
  height:200px;
  object-fit:cover;
}

.price{
  color:green;
  font-weight:bold;
}

button{
  background:red;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>❤️ My Wishlist</h2>

<div id="wishlist"></div>
<div id="footer"></div>
<script>

function getFav(){
  return JSON.parse(localStorage.getItem("fav")) || [];
}

function loadWishlist(){

  let fav = getFav();
  let html = "";

  if(fav.length === 0){
    html = "<p>No items in wishlist</p>";
  } else {

    fav.forEach(p => {
      html += `
        <div class="card">
          <img src="${p.images?.[0] || p.image}">
          <h3>${p.name || "No Name"}</h3>
          <p class="price">₹${p.price || 0}</p>

          <button onclick="removeItem('${p._id}')">Remove ❌</button>
        </div>
      `;
    });

  }

  document.getElementById("wishlist").innerHTML = html;
}

// ❌ REMOVE (safe remove using id)
function removeItem(id){
  let fav = getFav().filter(p => p.id !== id);
  localStorage.setItem("fav", JSON.stringify(fav));
  loadWishlist(); // reload without refresh
}

loadWishlist();
fetch("footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer").innerHTML = data;
  });
</script>

</body>
</html>
