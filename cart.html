    {

  flex: 1;
 margin-top: 70px;

<body>
<div class="header">

  <div class="menu-left"></div>

  <!-- LOGO CENTER -->
  <div class="logo-center" onclick="goHome()" style="cursor:pointer;">
    <div class="logo-text">
      FA<span class="flip-r">R</span>K
    </div>

    <div class="logo-bottom">
      <div class="line"></div>
      <span class="num">618</span>
      <div class="line"></div>
    </div>
  </div>

  <!-- RIGHT ICONS -->
  <div class="menu-right">

    <div class="icon" onclick="goPage('wishlist.html')">
      <i class="fa-regular fa-heart"></i>
    </div>

    <div class="icon" onclick="goPage('account.html')">
      <i class="fa-regular fa-user"></i>
    </div>

    <div class="icon cart" onclick="goPage('cart.html')">
      <i class="fa-solid fa-bag-shopping"></i>
      <span id="cartCount">0</span>
    </div>

  </div>

</div>
<div id="main-content">
<h1>🛒 Your Cart</h1>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<div class="address-box">
  <b>Deliver to:</b> Viswa Raj, 641008 
  <button class="change-btn">Change</button>
  <p>Fark 618, Kuniyamuthur, Coimbatore</p>
</div>
<div id="cartList"></div>

<div class="price-box">
  <h3>Price Details</h3>

  <p>Price: ₹<span id="total"></span></p>
  <p>Discount: ₹0</p>
  <p>Delivery: ₹0</p>

  <hr>

  <h2>Total Amount: ₹<span id="totalFinal"></span></h2>
</div>
  <div class="bottom-bar">
  <div class="price">₹<span id="totalBottom"></span></div>
  <button onclick="checkout()">Place Order</button>
</div>
<div id="footer"></div>
<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

// LOAD CART
function loadCart() {

  let html = "";
  let total = 0;

  if (cart.length === 0) {
    html = "<p>No items in cart</p>";
  } else {

    cart.forEach((item, index) => {

      let qty = item.qty || 1;
      let itemTotal = item.price * qty;
      total += itemTotal;

      html += `
<div class="cart-item">
  <img src="${item.image}" class="cart-img">

  <div class="cart-details">
    <h3>${item.name}</h3>
    <p>Size: ${item.size}</p>
    <p class="price">₹${item.price}</p>

    <div class="qty-box">
      Qty:
      <input type="number" min="1" value="${qty}" 
        onchange="updateQty(${index}, this.value)">
    </div>

    <div class="actions">
      <button onclick="removeItem(${index})">Remove</button>
    </div>
  </div>
</div>
`;
    });
  }

  document.getElementById("cartList").innerHTML = html;
  document.getElementById("total").innerText = total;
   document.getElementById("totalFinal").innerText = total;
  document.getElementById("totalBottom").innerText = total;
}


// UPDATE QTY
function updateQty(index, value) {
  cart[index].qty = parseInt(value) || 1;
  localStorage.setItem("cart", JSON.stringify(cart));
  loadCart();
}


// REMOVE ITEM
function removeItem(index) {
  cart.splice(index, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
  loadCart();
}


// CHECKOUT
function checkout() {

  if (cart.length === 0) {
    alert("Cart is empty ❌");
    return;
  }

  // next step page
  window.location.href = "checkout.html";
}
fetch("footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer").innerHTML = data;
  });
fetch("header.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("header").innerHTML = data;
    updateCartCount();
  });
// NAVIGATION
function goHome() {
  window.location.href = "/";
}

function goAccount() {
  window.location.href = "account.html";
}

function goCart() {
  window.location.href = "cart.html";
}


// INIT
loadCart();
function goPage(page){
  window.location.href = page;
}

function updateCartCount(){
  const cart = JSON.parse(localStorage.getItem("cart")) || [];
  const el = document.getElementById("cartCount");
  if(el){
    el.innerText = cart.length;
  }
}
</script>

</body>
</html>
