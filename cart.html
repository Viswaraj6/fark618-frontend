<!DOCTYPE html><html>
<head>
  <title>Cart</title>  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    .item {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }

    button {
      background: red;
      color: white;
      padding: 8px;
      border: none;
      margin-top: 10px;
      cursor: pointer;
    }

    .order-btn {
      background: green;
      display: block;
      margin: 20px auto;
      padding: 10px 20px;
    }
  </style></head><body><h1>🛒 Your Cart</h1><div id="cartItems"></div>
<h2 id="total"></h2><button class="order-btn" onclick="placeOrder()">Place Order</button>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function loadCart() {

  let html = "";
  let total = 0;

  cart.forEach((item, index) => {
    total += Number(item.price || 0);

    html += `
      <div class="item">
        <h3>${item.name}</h3>
        <p>₹${item.price}</p>
        <button onclick="removeItem(${index})">Remove</button>
      </div>
    `;
  });

  document.getElementById("cartItems").innerHTML = html;
  document.getElementById("total").innerText = "Total: ₹" + total;
}

function removeItem(index) {
  cart.splice(index, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
  loadCart();
}

// ✅ FINAL WORKING ORDER FUNCTION
function placeOrder() {

  if (cart.length === 0) {
    alert("Cart is empty ❌");
    return;
  }

  let total = 0;
  cart.forEach(item => total += Number(item.price || 0));

  let orders = JSON.parse(localStorage.getItem("orders")) || [];

  let newOrder = {
    id: Date.now(),
    items: cart,
    total: total,
    status: "Order Placed",
    date: new Date().toLocaleString()
  };

  orders.push(newOrder);

  localStorage.setItem("orders", JSON.stringify(orders));

  // clear cart
  localStorage.removeItem("cart");

  alert("Order placed successfully ✅");

  window.location.href = "account.html";
}

loadCart();

</script></body>
</html>
