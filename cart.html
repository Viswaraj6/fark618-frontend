<!DOCTYPE html>
<html>
<head>
  <title>Cart</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
      padding-bottom: 100px;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .info {
      flex: 1;
    }

    .actions {
      text-align: right;
    }

    button {
      padding: 6px 10px;
      margin: 5px;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    .remove {
      background: red;
      color: white;
    }

    .qty {
      width: 50px;
      text-align: center;
    }

    .total-box {
      background: white;
      padding: 15px;
      margin-top: 20px;
      border-radius: 10px;
      text-align: center;
    }

    .checkout {
      background: green;
      color: white;
      padding: 10px 20px;
      margin-top: 10px;
    }

    /* Bottom Nav */
    #bottomNav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 10px;
      border-top: 1px solid #ccc;
    }
    .footer {
  background: #111;
  color: #fff;
  padding: 30px 15px 10px;
  margin-top: 30px;
}

.footer-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 20px;
}

.footer-col h4 {
  margin-bottom: 10px;
  font-size: 14px;
}

.footer-col a {
  display: block;
  color: #ccc;
  text-decoration: none;
  margin: 5px 0;
  font-size: 13px;
}

.footer-col a:hover {
  color: #fff;
}

.footer-col p {
  font-size: 13px;
  color: #bbb;
}

.footer-bottom {
  text-align: center;
  margin-top: 20px;
  font-size: 12px;
  color: #888;
}
  </style>
</head>

<body>

<h1>🛒 Your Cart</h1>

<div id="cartList"></div>

<div class="total-box">
  <h2>Total: ₹<span id="total">0</span></h2>
  <button class="checkout" onclick="checkout()">Checkout</button>
</div>

<!-- Bottom Nav -->
<div id="bottomNav">
  <div onclick="goHome()">🏠<br>Home</div>
  <div onclick="goAccount()">👤<br>Account</div>
  <div onclick="goCart()">🛒<br>Cart</div>
</div>
<div id="footer"></div>
<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

// LOAD CART
function loadCart() {

  let html = "";
  let total = 0;

  if (cart.length === 0) {
    html = "<p>No items in cart</p>";
  } else {

    cart.forEach((item, index) => {

      let qty = item.qty || 1;
      let itemTotal = item.price * qty;
      total += itemTotal;

      html += `
        <div class="card">
          <div class="info">
            <h3>${item.name}</h3>
            <p>₹${item.price}</p>
            <p>Size: ${item.size}</p>
          </div>

          <div class="actions">
            <input type="number" min="1" value="${qty}" 
              onchange="updateQty(${index}, this.value)" class="qty">

            <br>

            <button class="remove" onclick="removeItem(${index})">Remove</button>
          </div>
        </div>
      `;
    });
  }

  document.getElementById("cartList").innerHTML = html;
  document.getElementById("total").innerText = total;
}


// UPDATE QTY
function updateQty(index, value) {
  cart[index].qty = parseInt(value) || 1;
  localStorage.setItem("cart", JSON.stringify(cart));
  loadCart();
}


// REMOVE ITEM
function removeItem(index) {
  cart.splice(index, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
  loadCart();
}


// CHECKOUT
function checkout() {

  if (cart.length === 0) {
    alert("Cart is empty ❌");
    return;
  }

  // next step page
  window.location.href = "checkout.html";
}
fetch("footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer").innerHTML = data;
  });

// NAVIGATION
function goHome() {
  window.location.href = "/";
}

function goAccount() {
  window.location.href = "account.html";
}

function goCart() {
  window.location.href = "cart.html";
}


// INIT
loadCart();

</script>

</body>
</html>
