<!DOCTYPE html>
<html>
<head>
  <title>Cart</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
      padding-bottom: 120px;
    }
.header{
  position: fixed;
  top: 0;
  width: 100%;
  background: #fff;
  z-index: 999;
  border-bottom: 1px solid #ddd;
}

body{
  padding-top: 80px; /* header space */
}
    h1 {
      text-align: center;
    }
.address-box{
  background: #fff;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 10px;
  font-size: 14px;
}

.change-btn{
  float: right;
  background: #eee;
  border: none;
  padding: 5px 10px;
  cursor: pointer;
}
    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .info {
      flex: 1;
    }

    .actions {
      text-align: right;
    }

    button {
      padding: 6px 10px;
      margin: 5px;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    .remove {
      background: red;
      color: white;
    }

    .qty {
      width: 50px;
      text-align: center;
    }

    .total-box {
      background: white;
      padding: 15px;
      margin-top: 20px;
      border-radius: 10px;
      text-align: center;
    }

    .checkout {
      background: green;
      color: white;
      padding: 10px 20px;
      margin-top: 10px;
    }
    .footer {
  background: #111;
  color: #fff;
  padding: 30px 15px 10px;
  margin-top: 30px;
  margin-bottom: 80px; /* 🔥 important */
}

.footer-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 20px;
}

.footer-col h4 {
  margin-bottom: 10px;
  font-size: 14px;
}

.footer-col a {
  display: block;
  color: #ccc;
  text-decoration: none;
  margin: 5px 0;
  font-size: 13px;
}

.footer-col a:hover {
  color: #fff;
}

.footer-col p {
  font-size: 13px;
  color: #bbb;
}
.cart-item{
  display: flex;
  gap: 15px;
  background: #fff;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.cart-img{
  width: 80px;
  height: 100px;
  object-fit: cover;
  border-radius: 6px;
}

.cart-details{
  flex: 1;
}

.price{
  font-weight: bold;
}
.price-box{
  background: #fff;
  padding: 15px;
  border-radius: 10px;
  margin-top: 15px;
}
.qty-box{
  margin-top: 5px;
}
   .bottom-bar{
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: #fff;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 20px;
  border-top: 1px solid #ccc;
  z-index: 1000; /* 🔥 important */
   margin-Right: 15px;
}

.bottom-bar button{
  background: #ffcc00;
  border: none;
  padding: 10px 20px;
  font-weight: bold;
  cursor: pointer;
}
.footer-bottom {
  text-align: center;
  margin-top: 20px;
  font-size: 12px;
  color: #888;
}
    {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  margin: 0;
}
    #main-content {
  flex: 1;
}
  </style>
</head>

<body>
  <div id="header"></div>
<div id="main-content">
<h1>🛒 Your Cart</h1>
<div class="address-box">
  <b>Deliver to:</b> Viswa Raj, 641008 
  <button class="change-btn">Change</button>
  <p>Fark 618, Kuniyamuthur, Coimbatore</p>
</div>
<div id="cartList"></div>

<div class="price-box">
  <h3>Price Details</h3>

  <p>Price: ₹<span id="total"></span></p>
  <p>Discount: ₹0</p>
  <p>Delivery: ₹0</p>

  <hr>

  <h2>Total Amount: ₹<span id="totalFinal"></span></h2>
</div>
  <div class="bottom-bar">
  <div class="price">₹<span id="totalBottom"></span></div>
  <button onclick="checkout()">Place Order</button>
</div>
<div id="footer"></div>
<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

// LOAD CART
function loadCart() {

  let html = "";
  let total = 0;

  if (cart.length === 0) {
    html = "<p>No items in cart</p>";
  } else {

    cart.forEach((item, index) => {

      let qty = item.qty || 1;
      let itemTotal = item.price * qty;
      total += itemTotal;

      html += `
<div class="cart-item">
  <img src="${item.image}" class="cart-img">

  <div class="cart-details">
    <h3>${item.name}</h3>
    <p>Size: ${item.size}</p>
    <p class="price">₹${item.price}</p>

    <div class="qty-box">
      Qty:
      <input type="number" min="1" value="${qty}" 
        onchange="updateQty(${index}, this.value)">
    </div>

    <div class="actions">
      <button onclick="removeItem(${index})">Remove</button>
    </div>
  </div>
</div>
`;
    });
  }

  document.getElementById("cartList").innerHTML = html;
  document.getElementById("total").innerText = total;
   document.getElementById("totalFinal").innerText = total;
  document.getElementById("totalBottom").innerText = total;
}


// UPDATE QTY
function updateQty(index, value) {
  cart[index].qty = parseInt(value) || 1;
  localStorage.setItem("cart", JSON.stringify(cart));
  loadCart();
}


// REMOVE ITEM
function removeItem(index) {
  cart.splice(index, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
  loadCart();
}


// CHECKOUT
function checkout() {

  if (cart.length === 0) {
    alert("Cart is empty ❌");
    return;
  }

  // next step page
  window.location.href = "checkout.html";
}
fetch("footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer").innerHTML = data;
  });
fetch("header.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("header").innerHTML = data;
    updateCartCount();
  });
// NAVIGATION
function goHome() {
  window.location.href = "/";
}

function goAccount() {
  window.location.href = "account.html";
}

function goCart() {
  window.location.href = "cart.html";
}


// INIT
loadCart();

</script>

</body>
</html>
