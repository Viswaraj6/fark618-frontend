<!DOCTYPE html>
<html>
<head>
<title>Admin</title>

<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; }
input,select { margin:10px; padding:10px; width:250px; }
button { padding:10px; background:black; color:white; }
.card { background:white; padding:15px; margin:10px; border-radius:10px; }
img { width:120px; }
</style>

</head>
<body>

<h2>Admin Panel 🔧</h2>

<input id="name" placeholder="Name">
<input id="price" placeholder="Price">
<input id="stock" placeholder="Stock">

<select id="type">
<option value="shirt">Shirt</option>
<option value="pant">Pant</option>
</select>

<!-- 🔥 SIZE -->
<input id="sizes" placeholder="Sizes (S,M,L or 30,32,34)">

<!-- 🔥 IMAGE -->
<input type="file" id="imageFile">

<button onclick="addProduct()">Add</button>

<h2>Products</h2>
<div id="products"></div>

<h2>Orders</h2>
<div id="orders"></div>

<script>

const BASE_URL = "https://fark618-1.onrender.com";

async function addProduct(){

const name = nameInput = document.getElementById("name").value;
const price = document.getElementById("price").value;
const stock = document.getElementById("stock").value;
const type = document.getElementById("type").value;

const sizes = document.getElementById("sizes").value.split(",");

const file = document.getElementById("imageFile").files[0];

let image = "";

if(file){
const reader = new FileReader();
reader.onload = async function(){
image = reader.result;

await sendProduct(name,price,stock,type,sizes,image);
}
reader.readAsDataURL(file);
}else{
sendProduct(name,price,stock,type,sizes,"");
}

}

function sendProduct(name,price,stock,type,sizes,image){

fetch(BASE_URL+"/add-product",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({name,price,stock,type,sizes,image})
})
.then(()=>{ alert("Added ✅"); loadProducts(); })

}


// PRODUCTS
function loadProducts(){

fetch(BASE_URL+"/products")
.then(res=>res.json())
.then(data=>{

let html="";

data.forEach(p=>{

html+=`
<div class="card">
<img src="${p.image}">
<h3>${p.name}</h3>
<p>₹${p.price}</p>
<p>Stock:${p.stock}</p>
<p>Sizes:${p.sizes?.join(",")}</p>

<button onclick="del('${p._id}')">Delete</button>
</div>
`;

});

products.innerHTML=html;

});

}


// DELETE
function del(id){
fetch(BASE_URL+"/products/"+id,{method:"DELETE"})
.then(()=>loadProducts());
}


// ORDERS
function loadOrders(){

fetch(BASE_URL+"/orders")
.then(res=>res.json())
.then(data=>{

let html="";

data.forEach(o=>{

let items="";

o.products.forEach(i=>{
items+=`<li>${i.name} - ${i.size}</li>`;
});

html+=`
<div class="card">
<p>Total: ₹${o.total}</p>
<ul>${items}</ul>
</div>
`;

});

orders.innerHTML=html;

});

}

loadProducts();
loadOrders();

</script>

</body>
</html>
