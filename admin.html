<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; }

input, select {
  margin:10px 0;
  padding:10px;
  width:250px;
}

button {
  padding:10px;
  background:black;
  color:white;
  border:none;
}

.card {
  background:white;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

img { width:120px; border-radius:10px; }

.logout { float:right; background:red; }
</style>

</head>
<body>

<h2>Admin Panel 🔧 
  <button class="logout" onclick="logout()">Logout</button>
</h2>

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<input id="stock" placeholder="Stock">

<select id="type">
  <option value="shirt">Shirt</option>
  <option value="pant">Pant</option>
</select>

<div id="sizeBox"></div>

<input type="file" id="imageFile">

<button onclick="addProduct()">Add Product</button>

<h2>Products</h2>
<div id="products"></div>

<script>

const BASE_URL = "https://fark618-backend.onrender.com";

if(!localStorage.getItem("adminToken")){
  alert("Login first ❌");
  location.href="admin-login.html";
}

function logout(){
  localStorage.removeItem("adminToken");
  location.href="admin-login.html";
}

document.getElementById("type").addEventListener("change", loadSizeOptions);

function loadSizeOptions(){
  let type = document.getElementById("type").value;
  let sizes = type==="shirt" ? ["S","M","L","XL","XXL"] : ["30","32","34","36","38","40"];

  let html="";
  sizes.forEach(s=>{
    html+=`<label><input type="checkbox" value="${s}"> ${s}</label><br>`;
  });

  document.getElementById("sizeBox").innerHTML = html;
}

loadSizeOptions();

async function addProduct(){

  const name = document.getElementById("name").value.trim();
  const price = document.getElementById("price").value;
  const stock = document.getElementById("stock").value;

  const sizes = [...document.querySelectorAll("#sizeBox input:checked")].map(cb=>cb.value);

  if(!name || !price || !stock){
    return alert("Fill all fields ❗");
  }

  let image="";

  const file = document.getElementById("imageFile").files[0];

  if(file){
    const reader = new FileReader();
    reader.onload = async function(e){
      image = e.target.result;
      sendProduct(name,price,stock,sizes,image);
    };
    reader.readAsDataURL(file);
  } else {
    sendProduct(name,price,stock,sizes,"");
  }
}

async function sendProduct(name,price,stock,sizes,image){

  const res = await fetch(BASE_URL+"/add-product",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+localStorage.getItem("adminToken")
    },
    body:JSON.stringify({ name,price,stock,sizes,image })
  });

  alert("Product Added ✅");
  loadProducts();
}

function loadProducts(){
  fetch(BASE_URL+"/products")
  .then(r=>r.json())
  .then(data=>{
    let html="";
    data.forEach(p=>{
      html+=`
      <div class="card">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>
        <button onclick="deleteProduct('${p._id}')">Delete</button>
      </div>`;
    });
    document.getElementById("products").innerHTML=html;
  });
}

function deleteProduct(id){
  fetch(BASE_URL+"/products/"+id,{
    method:"DELETE",
    headers:{ "Authorization":"Bearer "+localStorage.getItem("adminToken") }
  }).then(()=>loadProducts());
}

loadProducts();

</script>

</body>
</html>
