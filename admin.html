<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body {
  font-family: Arial;
  background:#f5f5f5;
  padding:20px;
}

input, select {
  margin:10px 0;
  padding:10px;
  width:250px;
}

button {
  padding:10px;
  background:black;
  color:white;
  border:none;
  cursor:pointer;
}

.card {
  background:white;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

img {
  width:120px;
  border-radius:10px;
}

.logout {
  float:right;
  background:red;
}
</style>
</head>

<body>

<h2>Admin Panel 🔧 
  <button class="logout" onclick="logout()">Logout</button>
</h2>

<!-- PRODUCT -->
<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<input id="stock" placeholder="Stock">

<select id="type">
  <option value="shirt">Shirt</option>
  <option value="pant">Pant</option>
</select>

<div id="sizeBox"></div>

<input type="file" id="imageFile">

<button onclick="addProduct()">Add Product</button>

<hr>

<!-- 🎬 BANNER -->
<h3>Banner Upload</h3>

<select id="bannerType">
  <option value="video">Video</option>
  <option value="slider">Image Slider</option>
</select>

<br>

<input type="file" id="bannerVideoFile">
<input type="file" id="bannerImages" multiple>

<br>

<button onclick="uploadBanner()">Upload Banner</button>

<hr>

<h2>Products</h2>
<div id="products"></div>

<h2>Orders</h2>
<div id="orders"></div>

<script>

const BASE_URL = "https://fark618-backend.onrender.com";

/* LOGIN CHECK */
if(!localStorage.getItem("adminToken")){
  alert("Login first ❌");
  window.location.href = "admin-login.html";
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("adminToken");
  window.location.href = "admin-login.html";
}

/* SIZE LOAD */
document.getElementById("type").addEventListener("change", loadSizeOptions);

function loadSizeOptions(){
  const type = document.getElementById("type").value;

  let sizes = type === "shirt"
    ? ["S","M","L","XL","XXL"]
    : ["30","32","34","36","38","40"];

  let html = "<p>Select Sizes:</p>";

  sizes.forEach(s => {
    html += `
      <label>
        <input type="checkbox" value="${s}" onchange="toggleStock(this)">
        ${s}
        <input type="number" id="stock-${s}" placeholder="Stock" style="display:none;width:80px;">
      </label><br>
    `;
  });

  document.getElementById("sizeBox").innerHTML = html;
}

loadSizeOptions();

/* TOGGLE STOCK */
function toggleStock(cb){
  const input = document.getElementById("stock-" + cb.value);
  input.style.display = cb.checked ? "inline-block" : "none";
}

/* ADD PRODUCT */
async function addProduct(){

  const name = document.getElementById("name").value;
  const price = Number(document.getElementById("price").value);
  const stock = Number(document.getElementById("stock").value);
  const type = document.getElementById("type").value;

  const checkboxes = document.querySelectorAll("#sizeBox input:checked");

  const sizes = [];
  const sizeStock = [];

  checkboxes.forEach(cb => {
    sizes.push(cb.value);

    const val = document.getElementById("stock-" + cb.value).value;

    sizeStock.push({
      size: cb.value,
      stock: Number(val || 0)
    });
  });

  if(!name || !price || !stock){
    alert("Fill all fields ❗");
    return;
  }

  const file = document.getElementById("imageFile").files[0];

  let image = "";

  if(file){
    const reader = new FileReader();

reader.onload = function(e){

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  const img = new Image();

  img.onload = function () {
    canvas.width = 300;
    canvas.height = 300;

    ctx.drawImage(img, 0, 0, 300, 300);

    const smallImage = canvas.toDataURL("image/jpeg", 0.5);

    image = smallImage;  // ✅ small image save
    send();
  };

  img.src = e.target.result;
};

reader.readAsDataURL(file);
  } else {
    send();
  }

  async function send(){
    await fetch(BASE_URL + "/add-product",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer " + localStorage.getItem("adminToken")
      },
      body: JSON.stringify({
        name,
        price,
        stock,
        type,
        sizes,
        sizeStock,
        image
      })
    });

    alert("Product Added ✅");
    loadProducts();
  }
}

/* BANNER UPLOAD */
async function uploadBanner(){

  const type = document.getElementById("bannerType").value;

  // VIDEO
  if(type === "video"){
    const file = document.getElementById("bannerVideoFile").files[0];

    if(!file){
      alert("Select video ❗");
      return;
    }

    const reader = new FileReader();

    reader.onload = async function(e){
      await fetch(BASE_URL + "/banner",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
          type:"video",
          videoUrl:e.target.result,
          images:[]
        })
      });

      alert("Video Updated ✅");
    };

    reader.readAsDataURL(file);
  }

  // SLIDER
  if(type === "slider"){
    const files = document.getElementById("bannerImages").files;

    if(files.length === 0){
      alert("Select images ❗");
      return;
    }

    let images = [];

    for(let i=0;i<files.length;i++){
      const reader = new FileReader();

      await new Promise(resolve=>{
        reader.onload = function(e){
          images.push(e.target.result);
          resolve();
        };
        reader.readAsDataURL(files[i]);
      });
    }

    await fetch(BASE_URL + "/banner",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        type:"slider",
        videoUrl:"",
        images
      })
    });

    alert("Slider Updated ✅");
  }
}

/* LOAD PRODUCTS */
function loadProducts(){
  fetch(BASE_URL + "/products")
  .then(res => res.json())
  .then(data => {

    let html = "";

    data.forEach(p => {
      html += `
        <div class="card">
          <img src="${p.image || ''}">
          <h3>${p.name}</h3>
          <p>₹${p.price}</p>
          <p>Stock: ${p.stock}</p>
          <button onclick="deleteProduct('${p._id}')">Delete</button>
        </div>
      `;
    });

    document.getElementById("products").innerHTML = html;
  });
}

/* DELETE */
function deleteProduct(id){
  if(!confirm("Delete?")) return;

  fetch(BASE_URL+"/products/"+id,{
    method:"DELETE",
    headers:{
      "Authorization":"Bearer "+localStorage.getItem("adminToken")
    }
  })
  .then(()=>loadProducts());
}

/* ORDERS */
function loadOrders(){
  fetch(BASE_URL + "/orders")
  .then(res => res.json())
  .then(data => {

    let html = "";

    (data || []).forEach(o => {

      let items = "";

      (o.products || []).forEach(i=>{
        items += `<li>
          ${i.name || "Item"} - ₹${i.price || 0}
          ${i.size ? `(Size: ${i.size})` : ""}
        </li>`;
      });

      html += `
        <div class="card">
          <p><b>${o.name || ""}</b></p>
          <p>${o.phone || ""}</p>
          <p>${o.address || ""}</p>
          <p>Total: ₹${o.total || 0}</p>

          <select onchange="updateStatus('${o._id}',this.value)">
            <option ${o.status==="Pending"?"selected":""}>Pending</option>
            <option ${o.status==="Shipped"?"selected":""}>Shipped</option>
            <option ${o.status==="Delivered"?"selected":""}>Delivered</option>
          </select>

          <ul>${items}</ul>
        </div>
      `;
    });

    document.getElementById("orders").innerHTML = html;
  });
}
/* UPDATE STATUS */
function updateStatus(id,status){
  fetch(BASE_URL+"/orders/"+id,{
    method:"PUT",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+localStorage.getItem("adminToken")
    },
    body: JSON.stringify({status})
  })
  .then(()=>loadOrders());
}

/* INIT */
loadProducts();
loadOrders();

</script>

</body>
</html>
