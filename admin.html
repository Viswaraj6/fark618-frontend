<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    input, select {
      display: block;
      margin: 10px 0;
      padding: 10px;
      width: 250px;
    }

    button {
      padding: 10px 15px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 5px;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px;
      border-radius: 10px;
    }

    img {
      width: 120px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div id="loginBox">
  <h2>Admin Login 🔐</h2>
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div id="adminPanel" style="display:none;">

  <h1>Admin Panel 🔧</h1>

  <h2>Add Product</h2>

  <input id="name" placeholder="Product name">
  <input id="price" placeholder="Price">
  <input id="stock" placeholder="Stock">

  <select id="type">
    <option value="shirt">Shirt</option>
    <option value="pant">Pant</option>
  </select>

  <input type="file" id="imageFile">

  <button onclick="addProduct()">Add Product</button>

  <h2>All Products</h2>
  <div id="products"></div>

  <h2>Orders</h2>
  <div id="orders"></div>

</div>

<script>

const BASE_URL = "https://fark618-1.onrender.com";

function login() {
  const u = user.value;
  const p = pass.value;

  if (u === "admin" && p === "1234") {
    loginBox.style.display = "none";
    adminPanel.style.display = "block";
    loadProducts();
    loadOrders();
  } else {
    alert("Wrong login ❌");
  }
}


// ADD PRODUCT
async function addProduct() {

  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const stock = document.getElementById("stock").value;
  const type = document.getElementById("type").value;

  const file = document.getElementById("imageFile").files[0];

  let imageBase64 = "";

  if (file) {
    imageBase64 = await toBase64(file);
  }

  fetch(BASE_URL + "/add-product", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "admin": "fark618"
    },
    body: JSON.stringify({
      name,
      price,
      stock,
      type,
      image: imageBase64
    })
  })
  .then(() => {
    alert("Added ✅");
    loadProducts();
  });
}


// BASE64
function toBase64(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
  });
}


// PRODUCTS
function loadProducts() {
  fetch(BASE_URL + "/products")
  .then(res => res.json())
  .then(data => {

    let html = "";

    data.forEach(p => {

      let sizeText = p.type === "shirt"
        ? "S, M, L, XL, XXL"
        : "30, 32, 34, 36, 38, 40";

      html += `
        <div class="card">
          <img src="${p.image}">
          <h3>${p.name}</h3>
          <p>₹${p.price}</p>
          <p>Stock: ${p.stock}</p>
          <p><b>Sizes:</b> ${sizeText}</p>
        </div>
      `;
    });

    products.innerHTML = html;
  });
}


// 🔥 ORDERS WITH SIZE
function loadOrders() {
  fetch(BASE_URL + "/orders")
  .then(res => res.json())
  .then(data => {

    let html = "";

    data.forEach(o => {

      let itemsHtml = "";

      o.products.forEach(item => {
        itemsHtml += `
          <li>
            ${item.name} - ₹${item.price}
            <br>Size: <b>${item.size || "-"}</b>
          </li>
        `;
      });

      html += `
        <div class="card">
          <p><b>Order:</b> ${o._id}</p>
          <p><b>Total:</b> ₹${o.total}</p>
          <p><b>Status:</b> ${o.status}</p>

          <ul>${itemsHtml}</ul>
        </div>
      `;
    });

    orders.innerHTML = html;
  });
}

</script>

</body>
</html>
