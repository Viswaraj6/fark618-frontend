<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body {
  font-family: Arial;
  background:#f5f5f5;
  padding:20px;
}

input, select {
  margin:10px 0;
  padding:10px;
  width:250px;
}

button {
  padding:10px;
  background:black;
  color:white;
  border:none;
  cursor:pointer;
}

.card {
  background:white;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

img {
  width:120px;
  border-radius:10px;
}

.logout {
  float:right;
  background:red;
}
</style>

</head>
<body>

<h2>Admin Panel 🔧 
  <button class="logout" onclick="logout()">Logout</button>
</h2>

<!-- PRODUCT FORM -->
<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<input id="stock" placeholder="Stock">

<select id="type">
  <option value="shirt">Shirt</option>
  <option value="pant">Pant</option>
</select>

<!-- SIZE -->
<div id="sizeBox"></div>

<!-- IMAGE -->
<input type="file" id="imageFile">

<button onclick="addProduct()">Add Product</button>

<!-- EXCEL -->
<h3>Import Excel 📥</h3>
<input type="file" id="excelFile">
<button onclick="importExcel()">Upload Excel</button>

<h2>Products</h2>
<div id="products"></div>

<h2>Orders</h2>
<div id="orders"></div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>

const BASE_URL = "https://fark618-1.onrender.com";

/* 🔐 CHECK LOGIN */
if(!localStorage.getItem("adminToken")){
  window.location.href = "admin-login.html";
}

/* 🔓 LOGOUT */
function logout(){
  localStorage.removeItem("adminToken");
  window.location.href = "admin-login.html";
}

/* ================= SIZE ================= */
document.getElementById("type").addEventListener("change", loadSizeOptions);

function loadSizeOptions() {

  const type = document.getElementById("type").value;

  let sizes = type === "shirt"
    ? ["S","M","L","XL","XXL"]
    : ["30","32","34","36","38","40"];

  let html = "<p>Select Sizes:</p>";

  sizes.forEach(s => {
    html += `
      <label>
        <input type="checkbox" value="${s}"> ${s}
      </label><br>
    `;
  });

  document.getElementById("sizeBox").innerHTML = html;
}

loadSizeOptions();

/* ================= ADD PRODUCT ================= */
async function addProduct(){

  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const stock = document.getElementById("stock").value;
  const type = document.getElementById("type").value;

  const checkboxes = document.querySelectorAll("#sizeBox input:checked");
  const sizes = [];

  checkboxes.forEach(cb => sizes.push(cb.value));

  if(sizes.length === 0){
    alert("Select size ❗");
    return;
  }

  const file = document.getElementById("imageFile").files[0];

  if(file){

    const img = new Image();
    const reader = new FileReader();

    reader.onload = function(e){
      img.src = e.target.result;
    };

    img.onload = function(){

      const canvas = document.createElement("canvas");

      const maxWidth = 600;
      const scale = maxWidth / img.width;

      canvas.width = maxWidth;
      canvas.height = img.height * scale;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      const compressed = canvas.toDataURL("image/jpeg", 0.7);

      sendProduct(name,price,stock,type,sizes,compressed);
    };

    reader.readAsDataURL(file);

  } else {
    sendProduct(name,price,stock,type,sizes,"");
  }
}

async function sendProduct(name,price,stock,type,sizes,image){

  const res = await fetch(BASE_URL+"/add-product",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization": localStorage.getItem("adminToken")
    },
    body:JSON.stringify({
      name, price, stock, type, sizes, image
    })
  });

  if(!res.ok){
    alert("Unauthorized ❌");
    return;
  }

  alert("Product Added ✅");
  loadProducts();
}

/* ================= EXCEL ================= */
function importExcel(){

  const file = document.getElementById("excelFile").files[0];

  if(!file){
    alert("Select Excel ❗");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e){

    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, { type: "array" });

    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(sheet);

    json.forEach(item => {

      let sizes = item.sizes
        ? item.sizes.split(",").map(s => s.trim())
        : [];

      fetch(BASE_URL+"/add-product",{
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "Authorization": localStorage.getItem("adminToken")
        },
        body:JSON.stringify({
          name: item.name,
          price: item.price,
          stock: item.stock,
          type: item.type,
          sizes,
          image: ""
        })
      });

    });

    alert("Excel Imported ✅");
    loadProducts();
  };

  reader.readAsArrayBuffer(file);
}

/* ================= PRODUCTS ================= */
function loadProducts(){

  fetch(BASE_URL+"/products")
  .then(res => res.json())
  .then(data => {

    let html = "";

    data.forEach(p => {

      html += `
      <div class="card">
        <img src="${p.image || ''}">
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>
        <p>Stock: ${p.stock}</p>
        <p>Sizes: ${p.sizes?.join(", ") || "-"}</p>

        <button onclick="deleteProduct('${p._id}')">Delete</button>
      </div>
      `;
    });

    document.getElementById("products").innerHTML = html;
  });
}

function deleteProduct(id){

  fetch(BASE_URL+"/products/"+id,{
    method:"DELETE",
    headers:{
      "Authorization": localStorage.getItem("adminToken")
    }
  })
  .then(() => loadProducts());
}

/* ================= ORDERS ================= */
function loadOrders(){

  fetch(BASE_URL+"/orders")
  .then(res => res.json())
  .then(data => {

    let html = "";

    data.forEach(o => {

      let items = "";

      o.products.forEach(i => {
        items += `
          <li>
            ${i.name} - ₹${i.price}
            <br>Size: <b>${i.size || "-"}</b>
          </li>
        `;
      });

      html += `
      <div class="card">
        <p><b>Total:</b> ₹${o.total}</p>

        <p>
          <b>Status:</b>
          <select onchange="updateStatus('${o._id}', this.value)">
            <option ${o.status==="Pending"?"selected":""}>Pending</option>
            <option ${o.status==="Shipped"?"selected":""}>Shipped</option>
            <option ${o.status==="Delivered"?"selected":""}>Delivered</option>
          </select>
        </p>

        <ul>${items}</ul>
      </div>
      `;
    });

    document.getElementById("orders").innerHTML = html;
  });
}

function updateStatus(id, status){

  fetch(BASE_URL+"/orders/"+id,{
    method:"PUT",
    headers:{
      "Content-Type":"application/json",
      "Authorization": localStorage.getItem("adminToken")
    },
    body: JSON.stringify({ status })
  })
  .then(() => {
    alert("Updated ✅");
    loadOrders();
  });
}

/* ================= INIT ================= */
loadProducts();
loadOrders();

</script>

</body>
</html>
