<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body {
  font-family: Arial;
  background:#f5f5f5;
  padding:20px;
}

input, select {
  margin:10px 0;
  padding:10px;
  width:250px;
}

button {
  padding:10px;
  background:black;
  color:white;
  border:none;
  cursor:pointer;
}

.card {
  background:white;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

img {
  width:120px;
  border-radius:10px;
}

.logout {
  float:right;
  background:red;
}

</style>

</head>
<body>

<h2>Admin Panel 🔧 
  <button class="logout" onclick="logout()">Logout</button>
</h2>

<!-- PRODUCT FORM -->
<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<input id="stock" placeholder="Stock">

<select id="type">
  <option value="shirt">Shirt</option>
  <option value="pant">Pant</option>
</select>

<!-- SIZE -->
<div id="sizeBox"></div>

<!-- IMAGE -->
<input type="file" id="imageFile">
<input type="file" id="videoFile">
<button onclick="uploadBannerVideo()">Upload Banner Video</button>
  <button onclick="addProduct()">Add Product</button>
<button onclick="saveBanner()">Save Banner</button>
<h2>Products</h2>
<div id="products"></div>

<h2>Orders</h2>
<div id="orders"></div>
<h3>Banner Type</h3>

<select id="bannerType">
  <option value="video">Video</option>
  <option value="slider">Image Slider</option>
</select>

<br><br>

<input type="text" id="videoUrl" placeholder="Video URL">

<br><br>

<input type="text" id="sliderImages" placeholder="Image URLs (comma separated)">
<script>

const BASE_URL = "https://fark618-backend.onrender.com";

/* 🔐 CHECK LOGIN */
if(!localStorage.getItem("adminToken")){
  alert("Login first ❌");
  window.location.href = "admin-login.html";
}

/* 🔓 LOGOUT */
function logout(){
  localStorage.removeItem("adminToken");
  window.location.href = "admin-login.html";
}

/* ================= SIZE ================= */
document.getElementById("type").addEventListener("change", loadSizeOptions);

function loadSizeOptions() {

  const type = document.getElementById("type").value;

  let sizes = type === "shirt"
    ? ["S","M","L","XL","XXL"]
    : ["30","32","34","36","38","40"];

  let html = "<p>Select Sizes:</p>";

 sizes.forEach(s => {
  html += `
    <label>
      <input type="checkbox" value="${s}" onchange="toggleStock(this)">
      ${s}
      <input type="number" placeholder="Stock" id="stock-${s}" style="display:none;width:80px;">
    </label><br>
  `;
});

  document.getElementById("sizeBox").innerHTML = html;
}

loadSizeOptions();

/* ================= ADD PRODUCT ================= */
async function addProduct(){

  const name = document.getElementById("name").value;
  const price = Number(document.getElementById("price").value);
  const stock = Number(document.getElementById("stock").value);
  const type = document.getElementById("type").value;

  const checkboxes = document.querySelectorAll("#sizeBox input:checked");
  const sizes = [];

  checkboxes.forEach(cb => sizes.push(cb.value));

  if(!name || !price || !stock){
    alert("Fill all fields ❗");
    return;
  }

  if(
  name.trim() === "" ||
  document.getElementById("price").value === "" ||
  document.getElementById("stock").value === ""
){
  alert("Fill all fields ❗");
  return;
}

  const imageFile = document.getElementById("imageFile").files[0];
  const videoFile = document.getElementById("videoFile").files[0];

  let image = "";
  let video = "";

  // 🔥 IMAGE (optional)
  if(imageFile){
    const reader = new FileReader();
    reader.onload = function(e){
      image = e.target.result;
      handleVideo();
    };
    reader.readAsDataURL(imageFile);
  } else {
    handleVideo();
  }


/* ================= SEND PRODUCT ================= */
async function sendProduct(name,price,stock,type,sizes,image,video){

  const res = await fetch(BASE_URL+"/add-product",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization": "Bearer " + localStorage.getItem("adminToken")
    },
   body: JSON.stringify({
  name,
  price,
  stock,
  type,
  sizes,
  sizeStock,
  image
})

  const data = await res.json();

  if(!res.ok){
    alert("Failed ❌");
    return;
  }

  alert("Product Added ✅");
  loadProducts();
}
/* ================= PRODUCTS ================= */
function loadProducts(){

  fetch(BASE_URL+"/products")
  .then(res => res.json())
  .then(data => {

    let html = "";

    data.forEach(p => {

      html += `
      <div class="card">
        <img src="${p.image || ''}">
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>
        <p>Stock: ${p.stock}</p>
        <p>Sizes: ${p.sizes?.join(", ") || "-"}</p>

        <button onclick="deleteProduct('${p._id}')">Delete</button>
      </div>
      `;
    });

    document.getElementById("products").innerHTML = html;
  });
}

function deleteProduct(id){

  if(!confirm("Delete product? ❗")) return;

  fetch(BASE_URL+"/products/"+id,{
    method:"DELETE",
    headers:{
      "Authorization": "Bearer " + localStorage.getItem("adminToken")
    }
  })
  .then(res => res.json())
  .then(data => {

    console.log("DELETE:", data);

    if(data.success){
      alert("Deleted ✅");
      loadProducts();
    } else {
      alert("Delete failed ❌");
    }

  })
  .catch(() => alert("Server error ❌"));
}

/* ================= ORDERS ================= */
function loadOrders(){

  fetch(BASE_URL+"/orders")
  .then(res => res.json())
  .then(data => {

    let html = "";

    data.forEach(o => {

      let items = "";

      o.products.forEach(i => {
        items += `
          <li>
            ${i.name} - ₹${i.price}
            <br>Size: <b>${i.size || "-"}</b>
          </li>
        `;
      });

      html += `
      <div class="card">

        <p><b>Name:</b> ${o.name}</p>
        <p><b>Phone:</b> ${o.phone}</p>
        <p><b>Address:</b> ${o.address}</p>

        <p><b>Total:</b> ₹${o.total}</p>

        <p>
          <b>Status:</b>
          <select onchange="updateStatus('${o._id}', this.value)">
            <option ${o.status==="Pending"?"selected":""}>Pending</option>
            <option ${o.status==="Shipped"?"selected":""}>Shipped</option>
            <option ${o.status==="Delivered"?"selected":""}>Delivered</option>
          </select>
        </p>

        <ul>${items}</ul>

      </div>
      `;
    });

    document.getElementById("orders").innerHTML = html;
  });
}
function updateStatus(id, status){

  fetch(BASE_URL+"/orders/"+id,{
    method:"PUT",
    headers:{
      "Content-Type":"application/json",
      "Authorization": "Bearer " + localStorage.getItem("adminToken")
    },
    body: JSON.stringify({ status })
  })
  .then(() => {
    alert("Updated ✅");
    loadOrders();
  });
}
async function saveBanner(){

  const type = document.getElementById("bannerType").value;
  const videoUrl = document.getElementById("videoUrl").value;
  const images = document.getElementById("sliderImages").value.split(",");

  await fetch(API + "/banner", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      type,
      videoUrl,
      images
    })
  });

  alert("Banner Updated ✅");
}
  function toggleStock(cb){
  const input = document.getElementById("stock-" + cb.value);
  input.style.display = cb.checked ? "inline-block" : "none";
}
 const sizeStock = [];

checkboxes.forEach(cb => {
  const stockVal = document.getElementById("stock-" + cb.value).value;
  sizeStock.push({
    size: cb.value,
    stock: Number(stockVal || 0)
  });
});
  async function uploadBannerVideo(){

  const file = document.getElementById("videoFile").files[0];

  if(!file){
    alert("Choose video ❗");
    return;
  }

  const reader = new FileReader();

  reader.onload = async function(e){

    const res = await fetch(BASE_URL + "/video", {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization": "Bearer " + localStorage.getItem("adminToken")
      },
      body: JSON.stringify({ url: e.target.result })
    });

    const data = await res.json();

    if(data.success){
      alert("Banner Video Updated ✅");
    } else {
      alert("Upload failed ❌");
    }
  };

  reader.readAsDataURL(file);
}
/* ================= INIT ================= */
loadProducts();
loadOrders();

</script>

</body>
</html>
