<!DOCTYPE html>
<html>
<head>
  <title>Checkout</title>
</head>

<body>

<h1>Checkout</h1>

<input id="name" placeholder="Name"><br><br>
<input id="phone" placeholder="Phone"><br><br>
<textarea id="address" placeholder="Address"></textarea><br><br>

<button onclick="payNow()">Pay Now</button>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>

const API = "https://fark618-1.onrender.com";

function payNow() {

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  if (!name || !phone || !address) {
    alert("Fill all fields ❗");
    return;
  }

  let total = 0;
  cart.forEach(i => total += i.price * (i.qty || 1));

  fetch(API + "/create-order", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({amount: total})
  })
  .then(res => res.json())
  .then(order => {

    var options = {
      key: "rzp_test_xxxxx", // 👈 your key id
      amount: order.amount,
      currency: "INR",
      name: "FARK 618",
      order_id: order.id,

      handler: function (response) {

        // 🔒 VERIFY PAYMENT
        fetch(API + "/verify-payment", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify(response)
        })
        .then(res => res.json())
        .then(data => {

          if (data.success) {

            // SAVE ORDER
            fetch(API + "/order", {
              method: "POST",
              headers: {"Content-Type":"application/json"},
              body: JSON.stringify({
                user: localStorage.getItem("user") || "guest",
                name,
                phone,
                address,
                products: cart,
                total,
                paymentId: response.razorpay_payment_id,
                status: "Paid"
              })
            });

            alert("Payment Success ✅");
            localStorage.removeItem("cart");
            window.location.href = "account.html";

          } else {
            alert("Payment verification failed ❌");
          }

        });

      }
    };

    var rzp = new Razorpay(options);
    rzp.open();

  });
}

</script>

</body>
</html>
