<!DOCTYPE html>
<html>
<head>
  <title>Checkout - FARK 618</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- 💳 Razorpay -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #eef2f7, #dfe9f3);
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 400px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      animation: fadeIn 0.5s ease;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    textarea {
      resize: none;
      height: 80px;
    }

    .total {
      margin-top: 15px;
      font-weight: bold;
      text-align: center;
      color: green;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(45deg, #ff9800, #ffcc00);
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.03);
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🛍 Checkout</h1>

  <input id="name" placeholder="Full Name">
  <input id="phone" placeholder="Phone Number">
  <textarea id="address" placeholder="Delivery Address"></textarea>

  <div class="total" id="totalAmount">Total: ₹0</div>

  <button onclick="payNow()">Pay Now 💳</button>

</div>

<script>

const API = "https://fark618-backend.onrender.com";

// 🧮 Calculate total on load
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;

cart.forEach(i => total += i.price * (i.qty || 1));
document.getElementById("totalAmount").innerText = "Total: ₹" + total;


// 💳 PAYMENT
function payNow() {
alert("Button working");
  console.log("Pay clicked");

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;

  if (!name || !phone || !address) {
    alert("Fill all fields ❗");
    return;
  }

  if (total === 0) {
    alert("Cart empty ❌");
    return;
  }

  fetch(API + "/create-order", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({amount: total})
  })
  .then(res => res.json())
  .then(order => {

    if(!order.id){
      alert("Order create failed ❌");
      return;
    }

    var options = {
      key: "rzp_test_SerYxhYWMF3IMm",
      amount: order.amount,
      currency: "INR",
      name: "FARK 618",
      description: "Order Payment",
      order_id: order.id,

      handler: function (response) {

        // ✅ VERIFY
        fetch(API + "/verify-payment", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify(response)
        })
        .then(res => res.json())
        .then(data => {

          if (data.success) {

            // ✅ SAVE ORDER
            fetch(API + "/order", {
              method: "POST",
              headers: {"Content-Type":"application/json"},
              body: JSON.stringify({
                user: localStorage.getItem("user") || "guest",
                name,
                phone,
                address,
                products: cart,
                total,
                paymentId: response.razorpay_payment_id,
                status: "Paid"
              })
            });

            alert("Payment Success ✅");
            localStorage.removeItem("cart");
            window.location.href = "account.html";

          } else {
            alert("Payment verification failed ❌");
          }

        });

      }
    };

    const rzp = new Razorpay(options);
    rzp.open();

  })
  .catch(err => {
    console.log(err);
    alert("Server error ❌");
  });

}

</script>

</body>
</html>
