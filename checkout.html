<!DOCTYPE html>
<html>
<head>
  <title>Checkout - FARK 618</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #eef2f7, #dfe9f3);
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 400px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    textarea {
      height: 80px;
    }

    .total {
      margin-top: 15px;
      font-weight: bold;
      text-align: center;
      color: green;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 15px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .payBtn {
      background: linear-gradient(45deg, #ff9800, #ffcc00);
    }

    .codBtn {
      background: #4caf50;
      color: white;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>🛍 Checkout</h1>

  <input id="name" placeholder="Full Name">
  <input id="phone" placeholder="Phone Number">
  <textarea id="address" placeholder="Delivery Address"></textarea>

  <div class="total" id="totalAmount">Total: ₹0</div>

  <button id="payBtn" class="payBtn">Pay Now 💳</button>
  <button id="codBtn" class="codBtn">Cash on Delivery 🚚</button>

</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>

const API = "https://fark618-backend.onrender.com";

// 🧮 CART
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;
cart.forEach(i => total += i.price * (i.qty || 1));

document.getElementById("totalAmount").innerText = "Total: ₹" + total;

// EVENTS
document.getElementById("payBtn").addEventListener("click", payNow);
document.getElementById("codBtn").addEventListener("click", cashOnDelivery);


// COMMON VALIDATION
function getUserData() {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;

  if (!name || !phone || !address) {
    alert("Fill all fields ❗");
    return null;
  }

  if (total === 0) {
    alert("Cart empty ❌");
    return null;
  }

  return { name, phone, address };
}


// 💳 ONLINE PAYMENT
function payNow() {

  let data = getUserData();
  if (!data) return;

  fetch(API + "/create-order", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({amount: total})
  })
  .then(res => res.json())
  .then(order => {

    if(!order.id){
      alert("Order create failed ❌");
      return;
    }

    var options = {
      key: "rzp_test_SfD9BzINtp65Kb",
      amount: order.amount,
      currency: "INR",
      name: "FARK 618",
      description: "Order Payment",
      order_id: order.id,

      handler: function (response) {

        fetch(API + "/verify-payment", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify(response)
        })
        .then(res => res.json())
        .then(result => {

          if (result.success) {

            saveOrder(data, "Paid", response.razorpay_payment_id);

          } else {
            alert("Payment verification failed ❌");
          }

        });

      }
    };

    const rzp = new Razorpay(options);
    rzp.open();

  })
  .catch(() => alert("Server error ❌"));
}


// 🚚 CASH ON DELIVERY
function cashOnDelivery() {

  let data = getUserData();
  if (!data) return;

  saveOrder(data, "Pending", "COD");

}


// 💾 SAVE ORDER FUNCTION
function saveOrder(userData, status, paymentId) {

  fetch(API + "/order", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      user: localStorage.getItem("user") || "guest",
      name: userData.name,
      phone: userData.phone,
      address: userData.address,
      products: cart,
      total,
      paymentId,
      status
    })
  })
  .then(() => {
    alert("Order placed ✅");
    localStorage.removeItem("cart");
    window.location.href = "account.html";
  });

}

</script>

</body>
</html>
