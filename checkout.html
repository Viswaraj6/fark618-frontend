<!DOCTYPE html>
<html>
<head>
  <title>Checkout</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
      padding-bottom: 100px;
    }

    h1 {
      text-align: center;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      background: green;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #bottomNav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 10px;
      border-top: 1px solid #ccc;
    }
  </style>
</head>

<body>

<h1>🧾 Checkout</h1>

<div class="box">
  <input type="text" id="name" placeholder="Your Name">
  <input type="text" id="phone" placeholder="Phone Number">
  <textarea id="address" placeholder="Delivery Address"></textarea>

  <button onclick="placeOrder()">Place Order</button>
</div>

<div id="bottomNav">
  <div onclick="goHome()">🏠<br>Home</div>
  <div onclick="goAccount()">👤<br>Account</div>
  <div onclick="goCart()">🛒<br>Cart</div>
</div>

<script>

const BASE_URL = "https://fark618-1.onrender.com";

function placeOrder() {

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  if (!name || !phone || !address) {
    alert("Fill all details ❗");
    return;
  }

  if (cart.length === 0) {
    alert("Cart empty ❌");
    return;
  }

  let total = 0;

  cart.forEach(item => {
    total += item.price * (item.qty || 1);
  });

  // SEND ORDER TO BACKEND
  fetch(BASE_URL + "/orders", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      user: localStorage.getItem("user") || "guest",
      name,
      phone,
      address,
      products: cart,
      total,
      status: "Placed",
      date: new Date()
    })
  })
  .then(res => res.json())
  .then(() => {

    alert("Order placed successfully ✅");

    localStorage.removeItem("cart");

    window.location.href = "account.html";
  })
  .catch(() => {
    alert("Error placing order ❌");
  });
}


// NAV
function goHome() {
  window.location.href = "/";
}

function goAccount() {
  window.location.href = "account.html";
}

function goCart() {
  window.location.href = "cart.html";
}

</script>

</body>
</html>
