<!DOCTYPE html>
<html>
<head>
  <title>Checkout - FARK 618</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #eef2f7, #dfe9f3);
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 400px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
.steps{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-bottom:20px;
}

.step{
  padding:10px 15px;
  border-radius:20px;
  background:#ddd;
}

.step.active{
  background:#2874f0;
  color:#fff;
}

.step-box{
  max-width:500px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
}
    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    textarea { height: 80px; }

    .total {
      margin-top: 15px;
      font-weight: bold;
      text-align: center;
      color: green;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 15px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .payBtn { background: linear-gradient(45deg, #ff9800, #ffcc00); }
    .codBtn { background: #4caf50; color: white; }
  </style>
</head>

<body>
<!-- TOP PRODUCT (optional preview) -->
<div id="productBoxTop" style="margin-bottom:15px;"></div>

<div class="container">

  <div class="steps">
    <div class="step active">1. Address</div>
    <div class="step">2. Order Summary</div>
    <div class="step">3. Payment</div>
  </div>

  <!-- STEP 1 -->
  <div id="step1" class="step-box">
    <h3>Delivery Address</h3>

    <input id="name" placeholder="Full Name">
    <input id="phone" placeholder="Phone Number">
    <textarea id="address" placeholder="Address"></textarea>

    <button onclick="goStep2()">Continue</button>
  </div>

  <!-- STEP 2 -->
  <div id="step2" class="step-box" style="display:none;">
    <h3>Order Summary</h3>

    <!-- 🔥 MAIN PRODUCT BOX -->
    <div id="productBox"></div>

    <h3>Total: ₹<span id="totalAmount"></span></h3>

    <button onclick="goStep3()">Continue</button>
  </div>

<!-- STEP 3 -->
<div id="step3" class="step-box" style="display:none;">
  <h3>Payment</h3>

 <button id="payBtn" onclick="payNow()">Pay Now 💳</button>
<button id="codBtn" onclick="cashOnDelivery()">Cash on Delivery 🚚</button>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>

const API = "https://fark618-backend.onrender.com";

// 🧮 CART
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let checkoutItem = JSON.parse(localStorage.getItem("checkout"));

let products = [];
let total = 0;// 🔥 IF BUY NOW
if(checkoutItem){
  products = [checkoutItem];
  total = checkoutItem.price;
} 
// 🔥 ELSE CART
else if(cart.length > 0){
  products = cart;
  cart.forEach(i => total += i.price * (i.qty || 1));
}
document.getElementById("totalAmount").innerText = total;
document.getElementById("totalAmount").innerText = "Total: ₹" + total;

function goStep2(){
  if(!validateStep1()) return;

  document.getElementById("step1").style.display = "none";
  document.getElementById("step2").style.display = "block";
}

function goStep3(){
  document.getElementById("step2").style.display = "none";
  document.getElementById("step3").style.display = "block";
}

function validateStep1(){
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;

  if(!name || !phone || !address){
    alert("Fill all fields ❗");
    return false;
  }
  return true;
}
// 🔥 VALIDATION + DATA
function getUserData() {

  let name = document.getElementById("name").value.trim();
  let phone = document.getElementById("phone").value.trim();
  let address = document.getElementById("address").value.trim();

  if (!name || !phone || !address) {
    alert("Fill all fields ❗");
    return null;
  }

  if (phone.length < 10) {
    alert("Enter valid phone ❗");
    return null;
  }

  if (total === 0) {
    alert("Cart empty ❌");
    return null;
  }

  return { name, phone, address };
}


// 💳 ONLINE PAYMENT
function payNow() {

  let data = getUserData();
  if (!data) return;

  fetch(API + "/create-order", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({amount: total})
  })
  .then(res => res.json())
  .then(order => {

    if(!order.id){
      alert("Payment setup missing ❌");
      return;
    }

    var options = {
      key: "rzp_test_SfD9BzINtp65Kb",
      amount: order.amount,
      currency: "INR",
      name: "FARK 618",
      description: "Order Payment",
      order_id: order.id,

      handler: function (response) {

        fetch(API + "/verify-payment", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify(response)
        })
        .then(res => res.json())
        .then(result => {

          if (result.success) {

            saveOrder(data, "Paid", response.razorpay_payment_id);

          } else {
            alert("Payment verification failed ❌");
          }

        });

      }
    };

    new Razorpay(options).open();

  })
  .catch(() => alert("Server error ❌"));
}


// 🚚 COD
function cashOnDelivery() {

  let data = getUserData();
  if (!data) return;

  saveOrder(data, "Pending", "COD");
}


// 💾 SAVE ORDER
function saveOrder(userData, status, paymentId) {

  fetch(API + "/order", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      user: localStorage.getItem("user") || "guest",
      name: userData.name,
      phone: userData.phone,
      address: userData.address,
      products: cart,
      total,
      paymentId,
      status
    })
  })
  .then(() => {
    alert("Order placed ✅");
    localStorage.removeItem("cart");
    window.location.href = "account.html";
  })
  .catch(() => alert("Order save failed ❌"));
}
// 🖼 SHOW PRODUCT
if(products.length > 0){
  let html = "";

  products.forEach(p => {
    html += `
      <div style="display:flex;gap:10px;margin-bottom:10px;align-items:center;">
        <img src="${p.images?.[0] || p.image}" width="60">
        <div>
          <p style="margin:0">${p.name}</p>
          <b>₹${p.price}</b><br>
          <small>Size: ${p.size || "-"}</small>
        </div>
      </div>
    `;
  });

  document.getElementById("productBox").innerHTML = html;
}
</script>

</body>
</html>
