<!DOCTYPE html>
<html>
<head>
  <title>My Account</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }

    .section {
      margin-top: 30px;
    }

    button {
      padding: 8px 12px;
      border: none;
      background: black;
      color: white;
      cursor: pointer;
      margin-top: 5px;
    }

    .fav {
      background: orange;
    }
  </style>
</head>

<body>

<h1>👤 My Account</h1>
<h3 id="welcome"></h3>

<!-- 🛒 ORDERS -->
<div class="section">
  <h2>📦 My Orders</h2>
  <div id="orders"></div>
</div>

<!-- ❤️ FAVORITES -->
<div class="section">
  <h2>❤️ Favorite Items</h2>
  <div id="favorites"></div>
</div>

<script>

const BASE_URL = "https://fark618-1.onrender.com";

// 🔑 GET USER
let user = localStorage.getItem("user");

// 🚫 LOGIN CHECK
if (!user) {
  window.location.href = "login.html";
}

// 👋 NORMALIZE USER (IMPORTANT FIX)
user = user.toLowerCase().trim();

document.getElementById("welcome").innerText = "Welcome, " + user;


// 🔥 LOAD ORDERS
function loadOrders() {

  fetch(BASE_URL + "/orders")
    .then(res => res.json())
    .then(data => {

      console.log("ALL ORDERS:", data);
      console.log("CURRENT USER:", user);

      let html = "";

      // ✅ STRONG FILTER FIX
      let myOrders = data.filter(o => 
        o.user && o.user.toLowerCase().trim() === user
      );

      if (myOrders.length === 0) {
        html = "<p>No orders yet</p>";
      } else {

        myOrders.reverse().forEach(o => {

          html += `
            <div class="card">
              <p><b>Order ID:</b> ${o._id}</p>
              <p><b>Total:</b> ₹${o.total}</p>
              <p><b>Status:</b> ${o.status}</p>
              <p><b>Date:</b> ${new Date(o.date).toLocaleString()}</p>

              <button onclick="track('${o._id}')">Track Order</button>
            </div>
          `;
        });

      }

      document.getElementById("orders").innerHTML = html;

    })
    .catch(err => {
      console.log("ORDER ERROR:", err);
      document.getElementById("orders").innerHTML = "<p>Error loading orders</p>";
    });
}


// 🔍 TRACK
function track(id) {
  window.location.href = "track.html?id=" + id;
}


// ❤️ FAVORITES
let favorites = JSON.parse(localStorage.getItem("fav")) || [];

function loadFavorites() {

  let html = "";

  if (favorites.length === 0) {
    html = "<p>No favorite items</p>";
  } else {

    favorites.forEach((item, index) => {
      html += `
        <div class="card">
          <h3>${item.name}</h3>
          <p>₹${item.price}</p>
          <button onclick="removeFav(${index})">Remove</button>
        </div>
      `;
    });

  }

  document.getElementById("favorites").innerHTML = html;
}


// ❌ REMOVE FAVORITE
function removeFav(i) {
  favorites.splice(i, 1);
  localStorage.setItem("fav", JSON.stringify(favorites));
  loadFavorites();
}


// 🚀 INIT
loadOrders();
loadFavorites();

</script>

</body>
</html>
