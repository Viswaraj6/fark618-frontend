<!DOCTYPE html>
<html>
<head>
  <title>My Account</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }

    .section {
      margin-top: 30px;
    }

    button {
      padding: 8px 12px;
      border: none;
      background: black;
      color: white;
      cursor: pointer;
      margin-top: 5px;
    }

    .fav {
      background: orange;
    }
  </style>
</head>

<body>

<h1>👤 My Account</h1>

<h3 id="welcome"></h3>

<!-- 🛒 ORDERS -->
<div class="section">
  <h2>📦 My Orders</h2>
  <div id="orders"></div>
</div>

<!-- ❤️ FAVORITES -->
<div class="section">
  <h2>❤️ Favorite Items</h2>
  <div id="favorites"></div>
</div>

<script>

const BASE_URL = "https://fark618-1.onrender.com";

const user = localStorage.getItem("user");

if (!user) {
  window.location.href = "login.html";
}

document.getElementById("welcome").innerText = "Welcome, " + user;

// 🔥 LOAD ORDERS
function loadOrders() {
  fetch(BASE_URL + "/orders")
    .then(res => res.json())
    .then(data => {

      let html = "";

      data
        .filter(o => o.user === user)
        .forEach(o => {

          html += `
            <div class="card">
              <p><b>Order ID:</b> ${o._id}</p>
              <p><b>Total:</b> ₹${o.total}</p>
              <p><b>Status:</b> ${o.status}</p>

              <button onclick="track('${o._id}')">Track Order</button>
            </div>
          `;
        });

      document.getElementById("orders").innerHTML =
        html || "<p>No orders yet</p>";
    });
}

// 🔍 TRACK
function track(id) {
  window.location.href = "track.html?id=" + id;
}

// ❤️ FAVORITES
let favorites = JSON.parse(localStorage.getItem("fav")) || [];

function loadFavorites() {

  let html = "";

  if (favorites.length === 0) {
    html = "<p>No favorite items</p>";
  }

  favorites.forEach((item, index) => {
    html += `
      <div class="card">
        <h3>${item.name}</h3>
        <p>₹${item.price}</p>
        <button onclick="removeFav(${index})">Remove</button>
      </div>
    `;
  });

  document.getElementById("favorites").innerHTML = html;
}

function removeFav(i) {
  favorites.splice(i, 1);
  localStorage.setItem("fav", JSON.stringify(favorites));
  loadFavorites();
}

// INIT
loadOrders();
loadFavorites();

</script>

</body>
</html>
