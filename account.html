<!DOCTYPE html>
<html>
<head>
  <title>My Account</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
      padding-bottom: 80px;
    }

    .card {
      background: white;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
    }

    #bottomNav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 10px;
      border-top: 1px solid #ccc;
    }
  </style>
</head>

<body>

<h1>👤 My Account</h1>

<h2>🛒 Cart Items</h2>
<div id="cartItems"></div>

<div id="bottomNav">
  <div onclick="goHome()">🏠<br>Home</div>
  <div onclick="goAccount()">👤<br>Account</div>
  <div onclick="goCart()">🛒<br>Cart</div>
</div>

<script>

// LOAD CART (FIXED)
function loadCart() {

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  let html = "";

  if (cart.length === 0) {
    html = "<p>No cart items</p>";
  } else {

    cart.forEach(c => {
      html += `
        <div class="card">
          <h3>${c.name}</h3>
          <p>₹${c.price}</p>
          <p>${c.size}</p>
        </div>
      `;
    });

  }

  document.getElementById("cartItems").innerHTML = html;
}


// NAVIGATION FIX
function goHome() {
  window.location.href = "/";
}

function goAccount() {
  window.location.href = "account.html";
}

function goCart() {
  window.location.href = "cart.html";
}

loadCart();

</script>

</body>
</html>
