<!DOCTYPE html>
<html>

<head>
  <title>Track Order</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
      text-align: center;
    }

    input {
      padding: 10px;
      width: 250px;
      margin: 10px;
    }

    button {
      padding: 10px 20px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    .card {
      background: white;
      padding: 20px;
      margin-top: 20px;
      border-radius: 10px;
    }

    /* 🔥 Timeline */
    .timeline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 30px;
    }

    .step {
      flex: 1;
      text-align: center;
      position: relative;
    }

    /* ✅ LINE FIXED */
    .step::after {
      content: "";
      position: absolute;
      top: 15px;
      left: 0;
      width: 100%;
      height: 4px;
      background: #ccc;
      z-index: -1;
    }

    .step:first-child::after {
      left: 50%;
      width: 50%;
    }

    .step:last-child::after {
      display: none;
    }

    .circle {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #ccc;
      margin: auto;
      position: relative;
      z-index: 2;
    }

    .active {
      background: green !important;
    }

    .active-line::after {
      background: green !important;
    }

  </style>

</head>

<body>

<h1>📦 Track Your Order</h1>

<input id="orderId" placeholder="Enter Order ID">
<br>
<button onclick="trackOrder()">Track</button>

<div id="result"></div>

<script>

const BASE_URL = "https://fark618-1.onrender.com";

function trackOrder() {

  const id = document.getElementById("orderId").value;

  if (!id) {
    alert("Enter Order ID ❌");
    return;
  }

  fetch(BASE_URL + "/orders")
    .then(res => res.json())
    .then(data => {

      const order = data.find(o => o._id === id);

      if (!order) {
        document.getElementById("result").innerHTML =
          "<p>Order not found ❌</p>";
        return;
      }

      const statusSteps = ["Pending", "Shipped", "Delivered"];

      let stepsHtml = "";

      statusSteps.forEach(step => {

        const active =
          statusSteps.indexOf(step) <= statusSteps.indexOf(order.status);

        stepsHtml += `
          <div class="step ${active ? "active-line" : ""}">
            <div class="circle ${active ? "active" : ""}"></div>
            <p>${step}</p>
          </div>
        `;
      });

      document.getElementById("result").innerHTML = `
        <div class="card">
          <h2>Order Tracking 📦</h2>
          <p><b>Order ID:</b> ${order._id}</p>
          <p><b>Total:</b> ₹${order.total}</p>

          <div class="timeline">
            ${stepsHtml}
          </div>
        </div>
      `;
    })
    .catch(err => {
      console.log(err);
      alert("Error loading order ❌");
    });
}

</script>

</body>
</html>
